                                            <p className="text-[10px] font-bold text-gray-400">BOBINAS</p>
                                            <p className="text-2xl font-black text-blue-600 leading-none">{scannedItems.length}</p>
                                        </div>
                                    </div>

                                    <div className="flex-grow overflow-y-auto space-y-3 pr-2">
                                        {scannedItems.length === 0 ? (
                                            <div className="h-full flex flex-col items-center justify-center text-gray-400 opacity-50">
                                                <Icon name="box" size={48} />
                                                <p className="mt-4 font-bold">No hay bobinas escaneadas</p>
                                            </div>
                                        ) : (
                                            scannedItems.map((item, idx) => (
                                                <div key={idx} className="bg-blue-50/50 border border-blue-100 p-3 rounded-xl flex justify-between items-center">
                                                    <div>
                                                        <div className="flex items-center gap-2">
                                                            <p className="font-bold text-blue-900 uppercase leading-tight">{item.proveedor}</p>
                                                            <span className="text-[9px] bg-blue-200 text-blue-800 px-1 rounded font-mono">{item.sku}</span>
                                                        </div>
                                                        <p className="text-[10px] text-gray-500 font-mono mt-1">ID: {item.uid} | LH: {item.loteHija}</p>
                                                    </div>
                                                    <div className="font-black text-lg text-blue-700">{item.kg} kg</div>
                                                </div>
                                            ))
                                        )}
                                    </div>

                                    <div className="pt-4 mt-4 border-t-2 border-gray-100">
                                        <button
                                            onClick={generarReporteSalida}
                                            disabled={scannedItems.length === 0}
                                            className="w-full bg-emerald-600 text-white py-4 rounded-xl font-black uppercase tracking-wider flex justify-center items-center gap-2 hover:bg-emerald-700 disabled:opacity-50 disabled:cursor-not-allowed shadow-lg"
                                        >
                                            <Icon name="filePdf" /> Generar Reporte PDF
                                        </button>
                                        <button
                                            onClick={() => {
                                                if (scannedItems.length === 0) return alert("No hay datos para exportar.");
                                                const ws = window.XLSX.utils.json_to_sheet(scannedItems.map(item => ({
                                                    'ID Bobina (UID)': item.uid,
                                                    'Proveedor': item.proveedor,
                                                    'Tipo': item.tipo,
                                                    'SKU/Artículo': item.sku,
                                                    'Lote Madre': item.loteMadre,
                                                    'Lote Hija': item.loteHija,
                                                    'Kg Netos': item.kg
                                                })));
                                                const wb = window.XLSX.utils.book_new();
                                                window.XLSX.utils.book_append_sheet(wb, ws, "Salidas");
                                                window.XLSX.writeFile(wb, `Exportacion_Salida_${formatDateDisplay(today).replace(/\//g, '-')}.xlsx`);
                                            }}
                                            disabled={scannedItems.length === 0}
                                            className="w-full mt-3 bg-green-700 text-white py-3 rounded-xl font-bold uppercase tracking-wider flex justify-center items-center gap-2 hover:bg-green-800 disabled:opacity-50 disabled:cursor-not-allowed shadow-md"
                                        >
                                            <Icon name="upload" /> Exportar a Excel
                                        </button>
                                        <button
                                            onClick={() => { if (window.confirm("¿Limpiar lista?")) setScannedItems([]); }}
                                            className="w-full mt-4 text-gray-400 text-sm font-bold py-2 hover:text-red-500"
                                        >
                                            Limpiar Lista
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="p-8 bg-red-50 min-h-screen flex flex-col justify-center items-center text-center">
                            <svg className="w-16 h-16 text-red-500 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                            <h1 className="text-3xl font-black text-red-700 mb-2">Algo salió mal en la aplicación</h1>
                            <p className="text-red-900 mb-6 max-w-md">Un error inesperado causó que la aplicación se detuviera. Para solucionarlo rápidamente, puedes reiniciar y limpiar los datos guardados.</p>
                            <pre className="bg-red-900 text-white text-left p-4 rounded-xl mb-6 text-xs max-w-2xl overflow-x-auto w-full shadow-inner shadow-red-950/50">
                                {this.state.error?.toString()}
                            </pre>
                            <button onClick={() => { localStorage.removeItem('molderilRows'); localStorage.removeItem('molderilScanned'); window.location.reload(); }} className="bg-red-600 text-white font-bold py-3 px-6 rounded-xl shadow-lg hover:bg-red-700 active:scale-95 transition-all text-lg">
                                Reiniciar y Borrar Datos
                            </button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>

</html>
