<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1. Recepción de Bobinas - Molderil S.A.</title>

    <!-- Librerías -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }

        @media print {
            body {
                background: white !important;
            }

            .no-print {
                display: none !important;
            }

            .print-only {
                display: block !important;
            }

            .page-break {
                page-break-after: always !important;
                break-after: page !important;
            }

            .print-area {
                border: none !important;
                box-shadow: none !important;
                margin: 0 !important;
                padding: 0 !important;
            }
        }

        @page {
            margin: 0;
            size: A4 portrait;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            padding: 5px;
        }

        #reader-relabel button {
            background-color: #2563eb;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            margin: 5px;
            cursor: pointer;
            border: none;
        }

        #reader-relabel select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 10px;
            width: 100%;
        }

        .th-resize {
            resize: horizontal;
            overflow: auto;
            position: relative;
            background-clip: padding-box;
        }

        .th-resize::-webkit-scrollbar {
            height: 0px;
            width: 0px;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        const generateId = () => Date.now() + Math.random();
        const generateUID = () => {
            const now = new Date();
            const yy = String(now.getFullYear()).slice(-2);
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            const hh = String(now.getHours()).padStart(2, '0');
            const min = String(now.getMinutes()).padStart(2, '0');
            const ss = String(now.getSeconds()).padStart(2, '0');
            const ms = String(now.getMilliseconds()).padStart(3, '0');
            const rnd = Math.floor(Math.random() * 100).toString().padStart(2, '0');
            return `${dd}${mm}${yy}-${hh}${min}${ss}-${ms}${rnd}`;
        };

        const Icon = ({ name, size = 18 }) => {
            const paths = {
                plus: "M12 5v14M5 12h14",
                trash: "M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2",
                printer: "M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6z",
                tag: "M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82zM7 7h.01",
                upload: "M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12",
                close: "M18 6L6 18 M6 6l12 12",
                save: "M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z M17 21v-8H7v8 M7 3v5h8",
                folder: "M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z",
                edit: "M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7 M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z",
                box: "M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z M3.27 6.96L12 12.01l8.73-5.05 M12 22.08V12",
                sort: "M4 6h16M4 12h10M4 18h4",
                check: "M20 6L9 17l-5-5",
                arrowLeft: "M19 12H5M12 19l-7-7 7-7",
                arrowUp: "M12 19V5M5 12l7-7 7 7",
                arrowDown: "M12 5v14M19 12l-7 7-7-7",
                share: "M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8 M16 6l-4-4-4 4 M12 2v13"
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d={paths[name]} />
                </svg>
            );
        };

        const QRCodeCanvas = ({ text, size = 140 }) => {
            const canvasRef = useRef(null);
            useEffect(() => {
                if (!canvasRef.current || !window.QRCode) return;
                canvasRef.current.innerHTML = '';
                new window.QRCode(canvasRef.current, {
                    text: text, width: size, height: size,
                    colorDark: "#000000", colorLight: "#ffffff",
                    correctLevel: window.QRCode.CorrectLevel.L
                });
            }, [text, size]);
            return <div ref={canvasRef} style={{ width: size, height: size }} title="QR Code Seguro" />;
        };

        const getQRCodeDataURL = (text) => {
            return new Promise((resolve) => {
                const div = document.createElement('div');
                new window.QRCode(div, { text: text, width: 256, height: 256, correctLevel: window.QRCode.CorrectLevel.L });
                setTimeout(() => {
                    const canvas = div.querySelector('canvas');
                    resolve(canvas.toDataURL('image/png'));
                }, 100);
            });
        };

        const drawBobinaLabelNative = async (doc, rowData, empresa, qrData, isDevolucionFlag = false) => {
            // A4 page is 210 x 297 mm

            // Outer Border
            doc.setLineWidth(1.5);
            doc.rect(10, 10, 190, 277);

            // 1. HEADER (10 to 35)
            doc.setFont("helvetica", "bold");
            doc.setFontSize(40);
            doc.text(empresa, 105, 23, { align: "center" });

            doc.setFontSize(14);
            doc.setTextColor(100, 100, 100);
            const tituloLabel = isDevolucionFlag ? "D E V O L U C I O N   D E   P R O D U C C I O N" : "I D E N T I F I C A C I O N   D E   B O B I N A";
            doc.text(tituloLabel, 105, 31, { align: "center" });
            doc.setTextColor(0, 0, 0);

            doc.setLineWidth(0.5);
            doc.line(10, 36, 200, 36);

            // 2. MAIN PRIORITY: TIPO DE PAPEL (36 to 70)
            doc.setFontSize(14);
            doc.setTextColor(100, 100, 100);
            doc.text("TIPO DE PAPEL", 15, 45);
            doc.setTextColor(0, 0, 0);

            // Big and bold
            doc.setFontSize(45);
            const tipoLines = doc.splitTextToSize(rowData.tipo || 'S/D', 180);
            doc.text(tipoLines, 15, 58);

            // Adjustable anchor based on how many lines "Tipo" took
            const nextY = 58 + ((tipoLines.length - 1) * 16);
            const anchorY = Math.max(nextY + 8, 80);

            doc.line(10, anchorY, 200, anchorY);

            // 3. MAIN PRIORITY: PESO NETO (and Corte if present)
            const midY = anchorY + 40;
            const bottomY = anchorY + 80;

            if (rowData.corte) {
                // Background for Corte
                doc.setFillColor(235, 235, 235); // Gris claro para no gastar tanto toner
                doc.rect(10, anchorY, 95, 80, 'F');
                
                // Linea separadora en el medio
                doc.line(105, anchorY, 105, bottomY);
                
                doc.setTextColor(0, 0, 0); // Texto en negro para que contraste

                doc.setFontSize(14);
                doc.text("ANCHO HIJA", 57.5, anchorY + 15, { align: "center", charSpace: 1 });

                doc.setFontSize(70);
                doc.text(rowData.corte, 57.5, midY + 15, { align: "center" });
                doc.setFontSize(16);
                doc.text("mm", 57.5, midY + 25, { align: "center" });

                // Weight box
                doc.setTextColor(0, 0, 0);
                doc.setFontSize(14);
                doc.text("PESO NETO", 152.5, anchorY + 15, { align: "center", charSpace: 1 });

                doc.setTextColor(0, 0, 0); // Negro puro absoluto para Brother 1212W
                doc.setFontSize(90);
                doc.text(rowData.kg.toString() || '0', 152.5, midY + 18, { align: "center" });
                doc.setFontSize(20);
                doc.text("kg", 152.5, midY + 30, { align: "center" });
            } else {
                // Full Width Peso
                doc.setFontSize(18);
                doc.setTextColor(100, 100, 100);
                doc.text("PESO NETO", 105, anchorY + 15, { align: "center", charSpace: 1 });

                doc.setTextColor(0, 0, 0); // Negro puro absoluto
                doc.setFontSize(120);
                doc.text(rowData.kg.toString() || '0', 105, midY + 20, { align: "center" });
                doc.setFontSize(26);
                doc.text("kg", 180, midY + 15);
            }
            doc.setTextColor(0, 0, 0);

            doc.line(10, bottomY, 200, bottomY);

            // 4. SECONDARY DATA & QR (bottomY to 277)
            const qrX = 140;

            // Proveedor
            doc.setFontSize(12);
            doc.setTextColor(100, 100, 100);
            doc.text("PROVEEDOR", 15, bottomY + 10);
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(26);
            doc.text(doc.splitTextToSize(rowData.proveedor || 'S/D', 115), 15, bottomY + 20);

            // SKU
            doc.setFontSize(12);
            doc.setTextColor(100, 100, 100);
            doc.text("SKU / ARTICULO", 15, bottomY + 38);
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(30);
            doc.text(doc.splitTextToSize(rowData.sku || 'S/D', 115), 15, bottomY + 48);

            // Gramaje and Ancho Orig
            doc.setFontSize(12);
            doc.setTextColor(100, 100, 100);
            doc.text("GRAMAJE", 15, bottomY + 68);
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(24);
            doc.text((rowData.gramaje || '---') + " gr", 15, bottomY + 76);

            doc.setFontSize(12);
            doc.setTextColor(100, 100, 100);
            doc.text("ANCHO ORIG.", 70, bottomY + 68);
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(24);
            doc.text((rowData.ancho || '---') + " mm", 70, bottomY + 76);

            // Lote Prod / Prov
            doc.setFontSize(12);
            doc.setTextColor(100, 100, 100);
            doc.text("LOTE PROD.", 15, bottomY + 88);
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(22);
            doc.text(rowData.loteHija || 'N/A', 15, bottomY + 96);

            doc.setFontSize(12);
            doc.setTextColor(100, 100, 100);
            doc.text("LOTE PROV.", 70, bottomY + 88);
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(22);
            doc.text(rowData.loteMadre || 'N/A', 70, bottomY + 96);

            // Right Block: QR Code
            doc.setDrawColor(200, 200, 200);
            const qrImg = await getQRCodeDataURL(qrData);
            doc.addImage(qrImg, 'PNG', qrX, bottomY + 15, 50, 50);

            doc.setFontSize(8);
            doc.setTextColor(100, 100, 100);
            doc.text("ID: " + rowData.uid, qrX + 25, bottomY + 70, { align: "center" });
        };

        const App = () => {
            const [isGeneratingPdf, setIsGeneratingPdf] = useState(false);
            const [isDevolucion, setIsDevolucion] = useState(false);
            const today = new Date().toISOString().split('T')[0];
            const empresa = "MOLDERIL S.A.";
            const scannerRef = useRef(null);
            const [showCloseModal, setShowCloseModal] = useState(false);
            const [isAutoLoadingDB, setIsAutoLoadingDB] = useState(true);
            const [showHelp, setShowHelp] = useState(false);

            const playSuccessSound = () => {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.type = 'sine'; osc.frequency.setValueAtTime(880, ctx.currentTime);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                osc.start(); osc.stop(ctx.currentTime + 0.1);
            };

            const [rows, setRows] = useState(() => {
                const saved = localStorage.getItem('molderilRows');
                if (saved) { try { const p = JSON.parse(saved); if (Array.isArray(p)) return p; } catch (e) { } }
                return [];
            });

            const getNewFormData = () => ({ id: generateId(), uid: generateUID(), fecha: today, proveedor: '', tipo: '', gramaje: '', ancho: '', sku: '', corte: '', kg: '', loteMadre: '', loteHija: '', obs: '' });
            const [formData, setFormData] = useState(getNewFormData());
            const [editingId, setEditingId] = useState(null);

            const [activeDropdown, setActiveDropdown] = useState(null);
            const [isRelabelScanning, setIsRelabelScanning] = useState(false);
            const [previewRow, setPreviewRow] = useState(null);
            const [previewPdfUrl, setPreviewPdfUrl] = useState(null);
            const [insumosDB, setInsumosDB] = useState([]);
            const insumosDBRef = useRef([]);
            const scannerRefRelabel = useRef(null);
            const lastRelabelScannedTime = useRef(0);

            const formatDateDisplay = (dateStr) => {
                if (!dateStr) return '--/--/----';
                const [y, m, d] = dateStr.split('-');
                return `${d}/${m}/${y}`;
            };
            const unformatDateDisplay = (displayStr) => {
                if (!displayStr || displayStr.includes('--')) return today;
                const [d, m, y] = displayStr.split('/');
                return `${y}-${m}-${d}`;
            };

            useEffect(() => { localStorage.setItem('molderilRows', JSON.stringify(rows)); }, [rows]);

            useEffect(() => {
                const handleClickOutside = (e) => {
                    if (!e.target.closest('.dropdown-container')) setActiveDropdown(null);
                };
                const handleKeyDown = (e) => {
                    if (e.key === 'Escape') setActiveDropdown(null);
                };
                document.addEventListener('mousedown', handleClickOutside);
                document.addEventListener('keydown', handleKeyDown);
                return () => {
                    document.removeEventListener('mousedown', handleClickOutside);
                    document.removeEventListener('keydown', handleKeyDown);
                };
            }, []);

            useEffect(() => {
                const cargarBaseDatosAutomatica = async () => {
                    try {
                        const response = await fetch('./BOBINAS.xlsx');
                        if (!response.ok) throw new Error("No se pudo hallar archivo");
                        const arrayBuffer = await response.arrayBuffer();
                        const wb = XLSX.read(new Uint8Array(arrayBuffer), { type: 'array' });
                        const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, defval: '' });
                        const parsed = [];
                        for (let i = 1; i < data.length; i++) {
                            const r = data[i];
                            if (Array.isArray(r) && r.join("").trim() !== "") {
                                parsed.push({
                                    proveedor: String(r[0] || '').trim().toUpperCase(),
                                    sku: String(r[1] || '').trim().toUpperCase(),
                                    tipo: String(r[2] || '').trim().toUpperCase(),
                                    gramaje: String(r[3] || '').trim().toUpperCase(),
                                    ancho: String(r[4] || '').trim().toUpperCase()
                                });
                            }
                        }
                        if (parsed.length > 0) {
                            setInsumosDB(parsed);
                            insumosDBRef.current = parsed;
                        }
                    } catch (error) { console.warn("E"); } finally { setIsAutoLoadingDB(false); }
                };
                cargarBaseDatosAutomatica();
            }, []);

            const totalKg = useMemo(() => rows.reduce((acc, r) => acc + (parseFloat(String((r && r.kg) || '').replace(',', '.')) || 0), 0), [rows]);

            const updateField = (field, value) => {
                const upperValue = (typeof value === 'string' && field !== 'fecha') ? value.toUpperCase() : value;
                setFormData(prev => ({ ...prev, [field]: upperValue }));
            };

            const handleSkuChange = (e) => {
                setActiveDropdown('sku'); // Forzar que la lista vuelva a abrirse si estaba cerrada
                const value = e.target.value.toUpperCase();
                if (value === '') {
                    updateField('sku', value);
                    return;
                }
                const norm = str => String(str || '').normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
                const valNorm = norm(value);
                
                // Block typing if the substring doesn't match any SKU in DB
                const isValidSubstring = insumosDB.some(item => norm(item.sku).includes(valNorm));
                if (isValidSubstring) {
                    updateField('sku', value);
                    // Autofill if it matches exactly
                    const exactMatch = insumosDB.find(item => norm(item.sku) === valNorm);
                    if (exactMatch) {
                        setFormData(prev => ({ ...prev, sku: value, tipo: exactMatch.tipo, gramaje: exactMatch.gramaje, ancho: exactMatch.ancho, proveedor: exactMatch.proveedor }));
                    }
                }
            };

            const handleSkuBlur = (e) => {
                const currentSku = e.target.value;
                if (!currentSku) return;
                const norm = str => String(str || '').normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
                const exactMatch = insumosDB.find(item => norm(item.sku) === norm(currentSku));
                
                // Si al salir del casillero no es exacto, vaciamos estos campos
                if (!exactMatch) {
                    setFormData(prev => ({ ...prev, tipo: '', proveedor: '', gramaje: '', ancho: '' }));
                }
            };

            const submitForm = () => {
                const norm = str => String(str || '').normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
                if (formData.sku) {
                    const exactMatch = insumosDB.find(item => norm(item.sku) === norm(formData.sku));
                    if (!exactMatch) {
                        alert("SKU / ARTÍCULOS: artículo no válido.");
                        return;
                    }
                }

                const faltantes = [];
                if (!formData.sku) faltantes.push("SKU / Artículo");
                if (!formData.tipo) faltantes.push("Descripción de Papel (Tipo)");
                if (!formData.kg) faltantes.push("Peso Neto (KG)");
                
                if (faltantes.length > 0) {
                    alert("Acción rechazada. Te falta completar los siguientes campos obligatorios:\n\n- " + faltantes.join("\n- ") + "\n\nPor favor, revísalos e inténtalo de nuevo.");
                    return;
                }
                if (editingId) {
                    setRows(prev => prev.map(r => r.id === editingId ? formData : r));
                    setEditingId(null);
                    setFormData(getNewFormData());
                } else {
                    setRows([...rows, formData]);
                    setFormData(prev => ({ ...prev, id: generateId(), uid: generateUID(), fecha: today, kg: '', loteMadre: '', loteHija: '', corte: '', obs: '' }));
                }
            };

            const cancelEdit = () => { setEditingId(null); setFormData(getNewFormData()); };
            const removeRow = (id) => { setRows(prev => prev.filter(r => r.id !== id)); if (editingId === id) cancelEdit(); };
            const startEdit = (row) => { setEditingId(row.id); setFormData(row); document.querySelector('main').scrollTop = 0; };

            const moveRowUp = (index) => {
                if (index === 0) return;
                setRows(prev => {
                    const newRows = [...prev];
                    const temp = newRows[index - 1];
                    newRows[index - 1] = newRows[index];
                    newRows[index] = temp;
                    return newRows;
                });
            };

            const moveRowDown = (index) => {
                if (index === rows.length - 1) return;
                setRows(prev => {
                    const newRows = [...prev];
                    const temp = newRows[index + 1];
                    newRows[index + 1] = newRows[index];
                    newRows[index] = temp;
                    return newRows;
                });
            };

            const procesarCierreLista = (actionType) => {
                if (rows.length === 0) { alert("La lista está vacía. Debes ingresar al menos una bobina."); setShowCloseModal(false); return; }
                setIsGeneratingPdf(true);
                setTimeout(async () => {
                    try {
                        const doc = new window.jspdf.jsPDF('p', 'mm', 'a4');

                        doc.setFont("helvetica", "bold");
                        doc.setFontSize(24);
                        doc.text(isDevolucion ? "DEVOLUCIÓN A DEPÓSITO" : "RESUMEN DE BOBINAS", 105, 20, { align: "center" });
                        doc.setFontSize(14);
                        doc.text(empresa, 105, 30, { align: "center" });

                        doc.setFont("helvetica", "normal");
                        doc.setFontSize(10);
                        doc.text(`Fecha de Cierre: ${formatDateDisplay(today)}`, 14, 45);
                        doc.text(`Total Bobinas: ${rows.length}`, 14, 52);
                        const kgsPallet = rows.reduce((acc, r) => acc + (parseFloat(String(r.kg || '0').replace(',', '.')) || 0), 0);
                        doc.text(`Total Kilos Brutos: ${kgsPallet} KG`, 14, 59);

                        const tableColumn = ["#", "SKU / ART", "TIPO", "PROVEEDOR", "LOTE PROD", "LOTE PROV", "NETO", "PESO ACUMULADO"];
                        
                        let acumArrayPdf = new Array(rows.length).fill(0);
                        let currentAcumReversedPdf = 0;
                        let currentSkuReversedPdf = null;
                        for (let i = rows.length - 1; i >= 0; i--) {
                            const rkg = parseFloat(String(rows[i].kg || '0').replace(',', '.')) || 0;
                            if (currentSkuReversedPdf !== rows[i].sku) {
                                currentAcumReversedPdf = 0;
                                currentSkuReversedPdf = rows[i].sku;
                            }
                            currentAcumReversedPdf += rkg;
                            acumArrayPdf[i] = currentAcumReversedPdf;
                        }

                        let lastSkuPdf = null;
                        const tableRows = [];
                        
                        rows.forEach((r, idx) => {
                            if (lastSkuPdf !== null && lastSkuPdf !== r.sku) {
                                tableRows.push([
                                    { content: '', colSpan: 8, styles: { fillColor: [226, 232, 240], minCellHeight: 3 } }
                                ]);
                            }
                            lastSkuPdf = r.sku;
                            const showAcumPdf = acumArrayPdf[idx] % 1 === 0 ? acumArrayPdf[idx] : parseFloat(acumArrayPdf[idx].toFixed(2));
                            
                            tableRows.push([
                                (idx + 1).toString(),
                                r.sku || '',
                                r.tipo || '',
                                r.proveedor || '',
                                r.loteHija || '',
                                r.loteMadre || '',
                                (r.kg || '0') + ' kg',
                                showAcumPdf + ' kg'
                            ]);
                        });

                        doc.autoTable({
                            startY: 65,
                            head: [tableColumn],
                            body: tableRows,
                            theme: 'grid',
                            headStyles: { fillColor: [40, 40, 40], textColor: [255, 255, 255] },
                            styles: { fontSize: 8, cellPadding: 2 }
                        });

                        // NEW SUMMARY PAGE
                        const grouped = rows.reduce((acc, r) => {
                            const key = r.sku || 'S/D';
                            if (!acc[key]) {
                                acc[key] = { sku: key, tipo: r.tipo || 'S/D', prov: r.proveedor || '', count: 0, totalKg: 0 };
                            }
                            acc[key].count += 1;
                            const rkg = parseFloat(String(r.kg || '0').replace(',', '.')) || 0;
                            acc[key].totalKg += rkg;
                            return acc;
                        }, {});
                        const summaryList = Object.values(grouped);

                        if (summaryList.length > 0) {
                            doc.addPage('a4', 'portrait');

                            doc.setFont("helvetica", "bold");
                            doc.setFontSize(22);
                            doc.setTextColor(30, 41, 59); // slate-800
                            doc.text("RESUMEN AGRUPADO POR ARTÍCULO", 105, 25, { align: "center" });

                            doc.setFontSize(10);
                            doc.setTextColor(148, 163, 184); // slate-400
                            doc.text(empresa, 105, 32, { align: "center" });

                            let currentX = 10;
                            let currentY = 45;
                            const cardW = 90;
                            const cardH = 45;
                            const marginX = 10;
                            const spacingX = 10;
                            const spacingY = 10;

                            for (let i = 0; i < summaryList.length; i++) {
                                const item = summaryList[i];

                                if (currentX + cardW > 200) {
                                    currentX = marginX;
                                    currentY += cardH + spacingY;
                                }
                                if (currentY + cardH > 280) {
                                    doc.addPage('a4', 'portrait');
                                    currentY = 20;
                                    currentX = marginX;
                                }

                                // Tarjeta: Fondo y Borde
                                doc.setFillColor(248, 250, 252);
                                doc.setDrawColor(203, 213, 225);
                                doc.setLineWidth(0.5);
                                doc.roundedRect(currentX, currentY, cardW, cardH, 3, 3, 'FD');

                                // Cabecera (SKU y Tipo) - fondo muy suave, lo dibujamos como línea para separar
                                doc.line(currentX, currentY + 24, currentX + cardW, currentY + 24);
                                doc.line(currentX + cardW / 2, currentY + 24, currentX + cardW / 2, currentY + cardH);

                                // SKU Header
                                doc.setFontSize(7);
                                doc.setTextColor(148, 163, 184);
                                doc.text("SKU / ARTICULO", currentX + 4, currentY + 6);
                                doc.setFontSize(12);
                                doc.setTextColor(15, 23, 42); // slate-900
                                doc.setFont("helvetica", "bold");
                                doc.text(doc.splitTextToSize(item.sku, cardW - 8), currentX + 4, currentY + 11);

                                // Tipo
                                doc.setFont("helvetica", "normal");
                                doc.setFontSize(9);
                                doc.setTextColor(71, 85, 105); // slate-600
                                const splitTipo = doc.splitTextToSize(item.tipo, cardW - 8);
                                doc.text(splitTipo, currentX + 4, currentY + 18);

                                // Cantidad (Bobinas)
                                doc.setFontSize(7);
                                doc.setTextColor(148, 163, 184);
                                doc.setFont("helvetica", "bold");
                                doc.text("BOBINAS (CANT)", currentX + (cardW / 4), currentY + 30, { align: "center" });
                                doc.setFontSize(22);
                                doc.setTextColor(51, 65, 85); // slate-700
                                doc.text(item.count.toString(), currentX + (cardW / 4), currentY + 40, { align: "center" });

                                // Kilos
                                doc.setFontSize(7);
                                doc.setTextColor(148, 163, 184);
                                doc.text("PESO AGRUPADO", currentX + (cardW * 0.75), currentY + 30, { align: "center" });
                                doc.setFontSize(24);
                                doc.setTextColor(37, 99, 235); // blue-600
                                const kgText = item.totalKg % 1 === 0 ? item.totalKg.toString() : item.totalKg.toFixed(2);
                                doc.text(kgText + " kg", currentX + (cardW * 0.75), currentY + 40, { align: "center" });

                                currentX += cardW + spacingX;
                            }
                        }
                        // END NEW SUMMARY PAGE

                        for (let i = 0; i < rows.length; i++) {
                            doc.addPage('a4', 'portrait');
                            const rowData = rows[i];
                            const opType = isDevolucion ? "DEVOLUCION" : "INGRESO";
                            const qrData = `UID:${rowData.uid}|OP:${opType}|PROV:${rowData.proveedor}|TIPO:${rowData.tipo}|FECHA:${formatDateDisplay(rowData.fecha)}|KG:${rowData.kg}|L.PROV:${rowData.loteMadre}|L.PROD:${rowData.loteHija}|A.HIJA:${rowData.corte}|SKU:${rowData.sku}`;
                            await drawBobinaLabelNative(doc, rowData, empresa, qrData, isDevolucion);
                        }

                        const fileName = `Impresion_Logistica_${formatDateDisplay(today).replace(/\//g, '-')}.pdf`;
                        // Siempre descargamos una copia local como respaldo
                        doc.save(fileName);

                        if (actionType === 'share') {
                            if (navigator.canShare) {
                                try {
                                    const blob = doc.output('blob');
                                    const file = new File([blob], fileName, { type: 'application/pdf' });
                                    await navigator.share({
                                        title: 'Resumen de Bobinas',
                                        files: [file]
                                    });
                                } catch (e) {
                                    console.log("Compartir cancelado o fallo", e);
                                }
                            } else {
                                alert("Tu navegador en PC no soporta abrir la ventana de compartir nativa. El documento se descargó exitosamente.");
                            }
                        }

                        setRows([]);
                        setEditingId(null);
                        setShowCloseModal(false);
                        setIsGeneratingPdf(false);
                    } catch (err) {
                        console.error(err);
                        alert("Error al generar PDF: " + err.message);
                        setIsGeneratingPdf(false);
                    }
                }, 100);
            };

            const closeRelabelScanner = () => {
                if (scannerRefRelabel.current) {
                    scannerRefRelabel.current.clear().then(() => { scannerRefRelabel.current = null; setIsRelabelScanning(false); }).catch(() => { scannerRefRelabel.current = null; setIsRelabelScanning(false); });
                } else setIsRelabelScanning(false);
            };

            useEffect(() => {
                if (isRelabelScanning) {
                    scannerRefRelabel.current = new Html5QrcodeScanner("reader-relabel", { fps: 10, qrbox: { width: 250, height: 250 } }, false);
                    scannerRefRelabel.current.render(
                        (decodedText) => {
                            if (Date.now() - lastRelabelScannedTime.current < 2000) return;
                            lastRelabelScannedTime.current = Date.now();
                            let isValid = false;
                            let parts = [];

                            if (decodedText.includes("MOLDERIL SA")) {
                                isValid = true;
                                parts = decodedText.split(" | ");
                            } else if (decodedText.includes("UID:") && decodedText.includes("SKU:")) {
                                isValid = true;
                                parts = decodedText.split("|");
                            }

                            if (isValid) {
                                let newRow = { id: generateId(), uid: generateUID(), fecha: today, proveedor: '', tipo: '', gramaje: '', ancho: '', sku: '', corte: '', kg: '', loteMadre: '', loteHija: '', obs: 'Re-etiquetado' };
                                parts.forEach(p => {
                                    if (p === "MOLDERIL SA") return;
                                    const idx = p.indexOf(":");
                                    if (idx === -1) return;
                                    const val = p.substring(idx + 1).trim();
                                    
                                    if (p.startsWith("UID:")) newRow.uid = val;
                                    else if (p.startsWith("PROV:")) newRow.proveedor = val;
                                    else if (p.startsWith("TIPO:")) newRow.tipo = val;
                                    else if (p.startsWith("KG:")) newRow.kg = val;
                                    else if (p.startsWith("L.PROV:")) newRow.loteMadre = val;
                                    else if (p.startsWith("L.PROD:")) newRow.loteHija = val;
                                    else if (p.startsWith("A.HIJA:")) newRow.corte = val;
                                    else if (p.startsWith("SKU:")) newRow.sku = val;
                                    else if (p.startsWith("GRAMAJE:")) newRow.gramaje = val;
                                    else if (p.startsWith("ANCHO:")) newRow.ancho = val;
                                    else if (p.startsWith("FECHA:")) newRow.fecha = val;
                                });
                                
                                // Buscamos en BD excel si falta algo (por ej. formato nuevo que no tiene gramaje/ancho en el QR)
                                const norm = str => String(str || '').normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
                                if (newRow.sku && insumosDBRef.current.length > 0) {
                                    const exactMatch = insumosDBRef.current.find(item => norm(item.sku) === norm(newRow.sku));
                                    if (exactMatch) {
                                        if (!newRow.gramaje) newRow.gramaje = exactMatch.gramaje;
                                        if (!newRow.ancho) newRow.ancho = exactMatch.ancho;
                                    }
                                }

                                playSuccessSound(); closeRelabelScanner();
                                setPreviewRow(newRow); setPreviewPdfUrl(null);
                                setTimeout(async () => {
                                    try {
                                        const doc = new window.jspdf.jsPDF('p', 'mm', 'a4');
                                        const qrData = decodedText;
                                        let isDev = decodedText.includes("OP: DEVOLUCION");
                                        await drawBobinaLabelNative(doc, newRow, empresa, qrData, isDev);
                                        setPreviewPdfUrl(URL.createObjectURL(doc.output('blob')));
                                    } catch (err) { }
                                }, 100);
                            }
                        }, () => { }
                    );
                }
            }, [isRelabelScanning]);



            useEffect(() => {
                if (isDevolucion && !editingId) {
                    setFormData(prev => ({ ...prev, proveedor: 'PRODUCCIÓN (MOLDERIL)' }));
                } else if (!isDevolucion && !editingId && formData.proveedor === 'PRODUCCIÓN (MOLDERIL)') {
                    setFormData(prev => ({ ...prev, proveedor: '' }));
                }
            }, [isDevolucion, editingId]);

            const handlePreview = (rowData) => {
                setPreviewRow(rowData); setPreviewPdfUrl(null);
                setTimeout(async () => {
                    try {
                        const doc = new window.jspdf.jsPDF('p', 'mm', 'a4');
                        const opType = isDevolucion ? "DEVOLUCION" : "INGRESO";
                        const qrData = `UID:${rowData.uid}|OP:${opType}|PROV:${rowData.proveedor}|TIPO:${rowData.tipo}|FECHA:${formatDateDisplay(rowData.fecha)}|KG:${rowData.kg}|L.PROV:${rowData.loteMadre}|L.PROD:${rowData.loteHija}|A.HIJA:${rowData.corte}|SKU:${rowData.sku}`;
                        await drawBobinaLabelNative(doc, rowData, empresa, qrData, isDevolucion);
                        setPreviewPdfUrl(URL.createObjectURL(doc.output('blob')));
                    } catch (err) {
                        alert("Error generating preview: " + err.message);
                        setPreviewPdfUrl(null);
                    }
                }, 100);
            };
            const exportarProyecto = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(rows));
                const a = document.createElement('a'); a.setAttribute("href", dataStr); a.setAttribute("download", `Proyecto_${today.replace(/\//g, '-')}.json`);
                document.body.appendChild(a); a.click(); a.remove();
            };
            const importarProyecto = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try { const imp = JSON.parse(evt.target.result); if (Array.isArray(imp)) setRows(imp); } catch (e) { }
                    e.target.value = null;
                }; reader.readAsText(file);
            };

            const borrarTodo = () => {
                if (window.confirm("¿Seguro que deseas borrar toda la grilla y la memoria caché? Esta acción no se puede deshacer.")) {
                    setRows([]);
                    setFormData(getNewFormData());
                    setEditingId(null);
                    localStorage.removeItem('molderilRows');
                }
            };

            return (
                <div className="flex h-screen bg-slate-100 overflow-hidden text-slate-800 font-sans">
                    {showHelp && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex flex-col justify-center items-center p-4">
                            <div className="bg-white p-6 md:p-8 rounded-3xl w-full max-w-2xl shadow-2xl relative max-h-[90vh] flex flex-col">
                                <div className="sticky top-0 bg-white pb-4 border-b border-slate-100 flex justify-between items-center shrink-0">
                                    <h3 className="font-black text-2xl text-indigo-900 flex items-center gap-3">
                                        <Icon name="tag" size={28} /> Manual de Recepción
                                    </h3>
                                    <button onClick={() => setShowHelp(false)} className="bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-full w-10 h-10 font-black text-xl flex items-center justify-center transition-colors">✕</button>
                                </div>

                                <div className="overflow-y-auto overflow-x-hidden pr-2 flex-1 mt-6 space-y-8 custom-scrollbar">

                                    <div className="space-y-3">
                                        <h4 className="font-bold text-lg text-slate-800 flex items-center gap-2"><span className="bg-indigo-100 text-indigo-700 w-8 h-8 rounded-lg flex justify-center items-center font-black">1</span> Determinar el Contexto</h4>
                                        <p className="text-slate-600 text-sm leading-relaxed px-10">En la parte superior, fije si va a registrar un <strong className="text-indigo-600">ROTULADO EN DEPOSITO</strong> (bobinas vírgenes recién compradas) o una <strong className="text-orange-500">DEVOLUCIÓN DE PRODUCCIÓN</strong> (material que regresa). Esto ajustará automáticamente el Proveedor y etiquetará el reporte final correctamente para la administración.</p>
                                    </div>

                                    <div className="space-y-3">
                                        <h4 className="font-bold text-lg text-slate-800 flex items-center gap-2"><span className="bg-emerald-100 text-emerald-700 w-8 h-8 rounded-lg flex justify-center items-center font-black">2</span> Función de Escáner y Re-etiquetado</h4>
                                        <p className="text-slate-600 text-sm leading-relaxed px-10">Use el botón <strong className="text-emerald-700">Re-Etiquetar</strong> para abrir la cámara. Si escanea un rótulo dañado de la fábrica, el sistema completará mágicamente todo el formulario con esos datos exactos, listo para re-imprimir un rótulo nuevo idéntico.</p>
                                    </div>

                                    <div className="space-y-3">
                                        <h4 className="font-bold text-lg text-slate-800 flex items-center gap-2"><span className="bg-blue-100 text-blue-700 w-8 h-8 rounded-lg flex justify-center items-center font-black">3</span> Carga por Buscador (Autocompletado)</h4>
                                        <p className="text-slate-600 text-sm leading-relaxed px-10">Para carga manual, escriba parte del SKU o Tipo de Papel. Se desplegará una lista de sugerencias basada en la Base de Datos. Al hacer clic, completará Tipo, SKU, Proveedor, Gramaje y Ancho en un segundo.</p>
                                    </div>

                                    <div className="space-y-3">
                                        <h4 className="font-bold text-lg text-slate-800 flex items-center gap-2"><span className="bg-amber-100 text-amber-700 w-8 h-8 rounded-lg flex justify-center items-center font-black">4</span> Cierre del Pallet o Recepción</h4>
                                        <p className="text-slate-600 text-sm leading-relaxed px-10">Una vez registradas todas las bobinas en la ventana inferior, toque el botón violeta <strong className="bg-indigo-600 text-white px-2 py-0.5 rounded">PROCESAR Pdfs</strong>. Esto le pedirá confirmar si desea <strong>Descargar</strong> el archivo PDF en el equipo actual o <strong>Compartirlo</strong> enviándolo directamente al teléfono o WhatsApp vinculado. Al finalizar se vaciará la lista.</p>
                                    </div>

                                </div>

                                <div className="pt-6 border-t border-slate-100 mt-4 shrink-0">
                                    <button onClick={() => setShowHelp(false)} className="w-full bg-slate-900 hover:bg-slate-800 text-white py-4 rounded-xl font-bold uppercase tracking-widest text-sm transition-colors">Entendido</button>
                                </div>
                            </div>
                        </div>
                    )}
                    {showCloseModal && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex flex-col justify-center items-center p-4">
                            <div className="bg-white p-6 md:p-8 rounded-3xl w-full max-w-sm text-center shadow-2xl relative">
                                {isGeneratingPdf ? (
                                    <div className="py-8">
                                        <div className="inline-block animate-spin w-16 h-16 border-4 border-emerald-500 border-t-transparent rounded-full mb-4"></div>
                                        <h3 className="font-black text-2xl text-slate-900">Generando PDF...</h3>
                                        <p className="text-slate-500 font-medium mt-2">Construyendo páginas vectoriales</p>
                                    </div>
                                ) : (
                                    <>
                                        <h3 className="font-black text-2xl text-slate-900 mb-6">Emisión de Rótulos</h3>
                                        <div className="space-y-4">
                                            <button onClick={() => procesarCierreLista('download')} className="w-full flex items-center justify-center gap-3 bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-4 rounded-xl font-bold text-lg transition-colors">
                                                <Icon name="printer" size={24} /> Descargar PDF
                                            </button>
                                            <button onClick={() => procesarCierreLista('share')} className="w-full flex items-center justify-center gap-3 bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-4 rounded-xl font-bold text-lg transition-colors shadow-lg shadow-emerald-500/20">
                                                <Icon name="share" size={24} /> Compartir (Móvil)
                                            </button>
                                            <button onClick={() => setShowCloseModal(false)} className="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 px-5 py-4 rounded-xl font-bold transition-colors mt-2">
                                                Cancelar
                                            </button>
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>
                    )}
                    {previewRow && (
                        <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-sm z-50 flex flex-col justify-center items-center p-4">
                            <div className="bg-white p-4 rounded-3xl w-full max-w-[220mm] h-[90vh] flex flex-col shadow-2xl">
                                <div className="flex justify-between items-center mb-3">
                                    <h3 className="font-extrabold text-lg text-slate-800">Vista Previa</h3>
                                    <button onClick={() => { setPreviewRow(null); setPreviewPdfUrl(null); }} className="bg-slate-200 w-10 h-10 rounded-xl font-bold">✕</button>
                                </div>
                                {previewPdfUrl ? <iframe src={previewPdfUrl} className="w-full h-full rounded-xl" title="Preview"></iframe> : <div>Cargando...</div>}
                            </div>
                        </div>
                    )}
                    {isRelabelScanning && (
                        <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-sm z-50 flex flex-col justify-center items-center p-4">
                            <div className="bg-white p-6 rounded-3xl w-full max-w-md text-center shadow-2xl">
                                <h3 className="font-black text-xl mb-2">Escanear QR</h3>
                                <div id="reader-relabel" className="w-full rounded-2xl overflow-hidden border-2 border-indigo-100"></div>
                                <button onClick={closeRelabelScanner} className="mt-6 bg-slate-100 py-4 w-full rounded-xl font-bold">Cancelar</button>
                            </div>
                        </div>
                    )}

                    <aside className="hidden md:flex w-64 bg-slate-900 shadow-2xl flex-shrink-0 flex-col no-print text-slate-300">
                        <div className="p-6 border-b border-slate-800">
                            <h1 className="text-white text-xl font-black uppercase tracking-tight">{empresa}</h1>
                            <p className="text-indigo-400 text-xs font-bold uppercase tracking-widest mt-1">Recepción</p>
                        </div>
                        <nav className="flex-1 p-4 space-y-2">
                            <a href="#" className="flex items-center gap-3 px-4 py-3 bg-indigo-600 text-white rounded-xl font-bold"><Icon name="box" size={20} /> Ingreso Bobinas</a>
                            <a href="index.html" className="flex items-center gap-3 px-4 py-3 hover:bg-slate-800 rounded-xl font-medium"><Icon name="arrowLeft" size={20} /> Salir al Menú</a>
                        </nav>
                        <div className="p-4 border-t border-slate-800"><button onClick={() => setShowHelp(true)} className="flex items-center gap-3 px-4 py-3 w-full hover:bg-slate-800 rounded-xl font-medium"><Icon name="tag" size={20} /> Ayuda</button></div>
                    </aside>

                    <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-slate-900 flex justify-around items-center p-3 border-t border-slate-800 z-50 no-print">
                        <a href="#" className="flex flex-col items-center gap-1 text-indigo-400">
                            <Icon name="box" size={24} />
                            <span className="text-[10px] font-bold uppercase tracking-widest">Ingreso</span>
                        </a>
                        <button onClick={() => setShowHelp(true)} className="flex flex-col items-center gap-1 text-slate-400 hover:text-white transition-colors">
                            <Icon name="tag" size={24} />
                            <span className="text-[10px] font-bold uppercase tracking-widest">Ayuda</span>
                        </button>
                        <a href="index.html" className="flex flex-col items-center gap-1 text-slate-400 hover:text-white transition-colors">
                            <Icon name="arrowLeft" size={24} />
                            <span className="text-[10px] font-bold uppercase tracking-widest">Menú</span>
                        </a>
                    </nav>

                    <div className="flex-1 flex flex-col h-screen overflow-hidden pb-16 md:pb-0">
                        <header className="bg-white border-b border-slate-300 px-4 md:px-6 py-2 md:py-3 flex flex-col md:flex-row justify-between items-start md:items-center flex-wrap gap-2 no-print z-10 w-full">
                            <div className="flex flex-wrap items-center gap-2 md:gap-4 w-full md:w-auto">
                                <h2 className="text-xl font-black text-slate-800">Panel de Carga</h2>
                                {!isAutoLoadingDB && insumosDB.length === 0 && <span className="bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs font-bold border border-red-300">⚠️ Falta Base datos</span>}
                            </div>
                            <div className="flex flex-wrap gap-2 md:gap-2 w-full md:w-auto">
                                <input type="file" id="json-upload" accept=".json" className="hidden" onChange={importarProyecto} />
                                <button onClick={borrarTodo} className="flex-1 md:flex-none justify-center bg-red-50 text-red-600 border border-red-300 px-3 py-2 font-bold rounded-xl text-xs hover:bg-red-100 flex items-center gap-1"><Icon name="trash" size={14} /> Borrar todo</button>
                                <button onClick={() => document.getElementById('json-upload').click()} className="flex-1 md:flex-none justify-center bg-slate-50 border border-slate-300 px-3 py-2 font-bold rounded-xl text-xs hover:bg-slate-100 flex items-center gap-1"><Icon name="folder" size={14} /> Sesión</button>
                                <button onClick={exportarProyecto} className="flex-1 md:flex-none justify-center w-full md:w-auto mt-2 md:mt-0 bg-slate-50 border border-slate-300 px-3 py-2 font-bold rounded-xl text-xs hover:bg-slate-100 flex items-center gap-1"><Icon name="save" size={14} /> Guardar</button>
                            </div>
                        </header>

                        <main className="flex-1 overflow-y-auto p-2 md:p-4">
                            <div className="max-w-6xl mx-auto space-y-4 pb-4">

                                <div className="flex bg-slate-200 rounded-2xl p-1 overflow-hidden shrink-0 shadow-inner max-w-2xl mx-auto">
                                    <button
                                        onClick={() => setIsDevolucion(false)}
                                        className={`flex-1 py-3 px-4 rounded-xl font-black text-xs md:text-sm uppercase tracking-wider transition-all duration-300 flex items-center justify-center gap-2 ${!isDevolucion ? 'bg-white text-indigo-700 shadow-md transform scale-100' : 'text-slate-600 hover:bg-slate-300'}`}>
                                        <Icon name="box" size={18} /> ROTULADO EN DEPOSITO
                                    </button>
                                    <button
                                        onClick={() => setIsDevolucion(true)}
                                        className={`flex-1 py-3 px-4 rounded-xl font-black text-xs md:text-sm uppercase tracking-wider transition-all duration-300 flex items-center justify-center gap-2 ${isDevolucion ? 'bg-orange-500 text-white shadow-md transform scale-100 shadow-orange-500/30' : 'text-slate-600 hover:bg-slate-300'}`}>
                                        <Icon name="arrowLeft" size={18} /> DEVOLUCIÓN (PRODUCCIÓN)
                                    </button>
                                </div>

                                <div className={`bg-white rounded-3xl shadow-xl border p-4 md:p-5 relative transition-all ${editingId ? 'border-amber-400 shadow-amber-500/20' : 'border-slate-200'}`}>
                                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 pb-3 border-b border-slate-100 gap-2">
                                        <h3 className="font-black text-lg text-indigo-900 flex items-center gap-2">
                                            <Icon name={editingId ? "edit" : "plus"} size={20} /> {editingId ? "Editando" : "Nueva Bobina"}
                                        </h3>
                                        <div className="flex flex-wrap items-center gap-2 w-full md:w-auto">
                                            <input type="date" className="flex-1 md:flex-none bg-slate-50 outline-none text-xs font-bold text-slate-700 rounded-lg px-2 py-2 cursor-pointer border border-slate-300" value={formData.fecha} onChange={e => updateField('fecha', e.target.value)} />
                                            <button onClick={() => setIsRelabelScanning(true)} className="flex-1 md:flex-none justify-center bg-emerald-50 border border-emerald-300 px-3 py-2 rounded-lg font-bold flex items-center gap-2 text-emerald-800 text-xs">
                                                <Icon name="camera" size={14} /> Re-Etiquetar
                                            </button>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 xl:grid-cols-12 gap-4 relative">
                                        <div className="xl:col-span-5 space-y-2">
                                            <div className="relative dropdown-container">
                                                <label className="block text-[10px] font-black text-slate-900 uppercase tracking-widest mb-1">SKU / Artículo</label>
                                                <input className="w-full h-10 px-3 rounded-xl border-2 border-slate-500 focus:border-indigo-500 outline-none text-sm font-black text-slate-900 bg-slate-50" value={formData.sku} onChange={handleSkuChange} onBlur={handleSkuBlur} onFocus={() => setActiveDropdown('sku')} placeholder="Buscar..." />
                                                {activeDropdown === 'sku' && (
                                                    <div className="absolute z-[9999] top-full left-0 mt-2 w-[450px] bg-white border shadow-2xl rounded-2xl max-h-[300px] overflow-y-auto overflow-x-hidden">
                                                        <div className="bg-indigo-50 px-4 py-2 text-xs font-bold text-indigo-900 border-b">Catálogo de Excel ({insumosDB.length})</div>
                                                        {insumosDB.filter(item => {
                                                            const norm = str => String(str || '').normalize("NFD").replace(/[̀-ͯ]/g, "").toUpperCase();
                                                            return formData.sku ? norm(item.sku).includes(norm(formData.sku)) : true;
                                                        }).filter((item, idx, self) => idx === self.findIndex(t => t.sku === item.sku))
                                                            .map((item, idx) => (
                                                                <div key={idx} className="p-4 hover:bg-slate-50 border-b cursor-pointer w-full text-left" onMouseDown={(e) => { e.preventDefault(); updateField('sku', item.sku); updateField('tipo', item.tipo); updateField('gramaje', item.gramaje); updateField('ancho', item.ancho); updateField('proveedor', item.proveedor); setActiveDropdown(null); }}>
                                                                    <div className="font-black text-slate-900 text-sm">{item.sku}</div>
                                                                    <div className="text-slate-600 text-xs">{item.tipo} | {item.gramaje}g | {item.ancho}mm</div>
                                                                </div>
                                                            ))}
                                                    </div>
                                                )}
                                            </div>
                                            <div>
                                                <label className="block text-[10px] font-black text-slate-900 uppercase tracking-widest mb-1">Descripción de Papel</label>
                                                <input className="w-full h-10 px-3 rounded-xl border-2 border-slate-500 focus:border-indigo-500 outline-none text-sm font-black text-slate-900 uppercase" value={formData.tipo} onChange={e => updateField('tipo', e.target.value)} onFocus={() => setActiveDropdown('tipo')} />
                                            </div>
                                            <div className="grid grid-cols-2 gap-3">
                                                <div><label className="block text-[10px] font-black text-slate-900 uppercase tracking-widest mb-1">Gramaje</label><input readOnly className="w-full h-9 px-3 rounded-xl border-2 border-slate-300 bg-slate-200 outline-none font-black text-slate-500 uppercase text-sm cursor-not-allowed" value={formData.gramaje} /></div>
                                                <div><label className="block text-[10px] font-black text-slate-900 uppercase tracking-widest mb-1">Ancho Original</label><input readOnly className="w-full h-9 px-3 rounded-xl border-2 border-slate-300 bg-slate-200 outline-none font-black text-slate-500 uppercase text-sm cursor-not-allowed" value={formData.ancho} /></div>
                                            </div>
                                        </div>

                                        <div className="xl:col-span-4 space-y-2">
                                            <div className="relative dropdown-container">
                                                <label className="block text-[10px] font-black text-slate-900 uppercase tracking-widest mb-1">Proveedor Oficial</label>
                                                <input className="w-full h-10 px-3 rounded-xl border-2 border-slate-500 outline-none font-black text-slate-900 uppercase text-sm" value={formData.proveedor} onChange={e => updateField('proveedor', e.target.value)} onFocus={() => setActiveDropdown('proveedor')} />
                                                {activeDropdown === 'proveedor' && (
                                                    <div className="absolute z-[9999] top-full left-0 mt-2 w-full bg-white shadow-2xl rounded-xl max-h-[250px] overflow-y-auto border">
                                                        {insumosDB.filter((item, idx, self) => idx === self.findIndex(t => t.proveedor === item.proveedor)).map((item, idx) => (
                                                            <div key={idx} className="p-3 hover:bg-slate-100 cursor-pointer font-bold uppercase text-sm border-b" onMouseDown={(e) => { e.preventDefault(); updateField('proveedor', item.proveedor); setActiveDropdown(null); }}>{item.proveedor}</div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                            <div><label className="block text-[10px] font-black text-slate-900 uppercase tracking-widest mb-1">Lote Proveedor (Fábrica)</label><input className="w-full h-9 px-3 rounded-xl border-2 border-slate-500 bg-slate-50 font-black text-slate-900 uppercase text-sm" value={formData.loteMadre} onChange={e => updateField('loteMadre', e.target.value)} /></div>
                                            <div><label className="block text-[10px] font-black text-slate-900 uppercase tracking-widest mb-1">Lote Producción (Molderil)</label><input className="w-full h-9 px-3 rounded-xl border-2 border-slate-500 bg-slate-50 font-black text-slate-900 uppercase text-sm" value={formData.loteHija} onChange={e => updateField('loteHija', e.target.value)} /></div>
                                        </div>

                                        <div className="xl:col-span-3 flex flex-col justify-end bg-indigo-50 p-4 rounded-2xl border border-indigo-200/60">
                                            <div className="mb-2"><label className="block text-[10px] font-black text-slate-900 uppercase tracking-widest mb-1 text-center">Ancho Hija (Corte mm)</label><input className="w-full h-9 text-center font-black text-slate-900 text-sm rounded-xl border-2 border-slate-500 outline-none" placeholder="Opcional" value={formData.corte} onChange={e => updateField('corte', e.target.value)} /></div>
                                            <div><label className="block text-[10px] font-black text-slate-900 uppercase tracking-widest mb-1 text-center">PESO NETO</label><div className="relative"><input className="w-full h-12 text-center font-black text-slate-900 bg-blue-100 text-2xl rounded-xl border-2 border-slate-500 outline-none pr-8" placeholder="0.00" value={formData.kg} onChange={e => updateField('kg', e.target.value.replace(/[^0-9.]/g, '').replace(/(\..*?)\..*/g, '$1'))} /><span className="absolute right-3 top-1/2 -translate-y-1/2 font-black text-slate-900 text-sm">KG</span></div></div>
                                        </div>
                                    </div>

                                    <div className="mt-4 flex flex-col md:flex-row justify-end gap-2 pt-4 border-t border-slate-200">
                                        {editingId && <button onClick={cancelEdit} className="w-full md:w-auto px-5 py-3 md:py-2 rounded-xl font-bold bg-slate-100 text-sm">Cancelar</button>}
                                        <button onClick={() => setFormData(getNewFormData())} className="w-full md:w-auto px-5 py-3 md:py-2 rounded-xl font-bold border border-slate-300 text-slate-700 text-sm hover:bg-slate-50">Limpiar</button>
                                        <button onClick={submitForm} className={`w-full md:w-auto justify-center px-8 py-3 md:py-2 rounded-xl font-black text-white shadow-xl text-sm flex gap-2 items-center ${editingId ? 'bg-amber-500' : 'bg-indigo-600'}`}><Icon name={editingId ? "save" : "plus"} size={16} />{editingId ? "Actualizar Fila" : "Agregar a la Lista"}</button>
                                    </div>
                                </div>

                                <div className="bg-white rounded-3xl shadow-sm border border-slate-300 overflow-hidden mt-3">
                                    <div className="p-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center"><h4 className="font-extrabold text-slate-800 flex items-center gap-2">Resumen de Carga ({rows.length} bobinas)</h4></div>
                                    {rows.length === 0 ? (<div className="p-12 text-center text-slate-500 font-bold">No hay bobinas ingresadas en esta sesión.</div>) : (
                                        <div className="overflow-x-auto"><table className="w-full text-left whitespace-nowrap min-w-max">
                                            <thead className="bg-white border-b border-slate-300"><tr>
                                                <th className="px-4 py-2 text-[10px] font-black text-slate-500">ACCIONES</th><th className="px-4 py-2 text-[10px] font-black text-slate-500">SKU</th><th className="px-4 py-2 text-[10px] font-black text-slate-500">TIPO</th><th className="px-4 py-2 text-[10px] font-black text-slate-500">PROVEEDOR</th><th className="px-4 py-2 text-[10px] font-black text-slate-500">LOTE PROVEEDOR</th><th className="px-4 py-2 text-[10px] font-black text-indigo-600 text-right">KILOS</th><th className="px-4 py-2 text-[10px] font-black text-emerald-600 text-right">PESO ACUMULADO</th><th className="px-4 py-2 text-[10px] font-black text-slate-500 text-center">ELIMINAR / EDITAR</th>
                                            </tr></thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {(() => {
                                                    let acumArray = new Array(rows.length).fill(0);
                                                    let currentAcumReversed = 0;
                                                    let currentSkuReversed = null;
                                                    for (let i = rows.length - 1; i >= 0; i--) {
                                                        const rkg = parseFloat(String(rows[i].kg || '0').replace(',', '.')) || 0;
                                                        if (currentSkuReversed !== rows[i].sku) {
                                                            currentAcumReversed = 0;
                                                            currentSkuReversed = rows[i].sku;
                                                        }
                                                        currentAcumReversed += rkg;
                                                        acumArray[i] = currentAcumReversed;
                                                    }

                                                    let lastSku = null;
                                                    const renderedRows = [];
                                                    
                                                    rows.forEach((row, idx) => {
                                                        if (lastSku !== null && lastSku !== row.sku) {
                                                            renderedRows.push(
                                                                <tr key={`sep-${idx}`} className="bg-slate-200">
                                                                    <td colSpan="8" className="h-1.5 p-0"></td>
                                                                </tr>
                                                            );
                                                        }
                                                        lastSku = row.sku;
                                                        
                                                        const showAcum = acumArray[idx] % 1 === 0 ? acumArray[idx] : parseFloat(acumArray[idx].toFixed(2));
                                                        
                                                        renderedRows.push(
                                                            <tr key={row.id} className={`hover:bg-indigo-50/50 ${editingId === row.id ? 'bg-amber-50' : ''}`}>
                                                                <td className="px-4 py-2 font-mono text-[10px] font-bold text-slate-500">
                                                                    <div className="flex flex-col md:flex-row items-center gap-1 justify-center">
                                                                        <button onClick={() => moveRowUp(idx)} disabled={idx === 0} className={`p-0.5 rounded ${idx === 0 ? 'text-slate-200 cursor-not-allowed' : 'text-slate-500 hover:bg-slate-200'}`} title="Subir"><Icon name="arrowUp" size={14} /></button>
                                                                        <span>{idx + 1}</span>
                                                                        <button onClick={() => moveRowDown(idx)} disabled={idx === rows.length - 1} className={`p-0.5 rounded ${idx === rows.length - 1 ? 'text-slate-200 cursor-not-allowed' : 'text-slate-500 hover:bg-slate-200'}`} title="Bajar"><Icon name="arrowDown" size={14} /></button>
                                                                    </div>
                                                                </td>
                                                                <td className="px-4 py-2 font-black text-indigo-900 text-xs">{row.sku}</td>
                                                                <td className="px-4 py-2 font-bold text-slate-600 text-[10px]">{row.tipo}</td>
                                                                <td className="px-4 py-2 font-bold text-slate-600 text-[10px]">{row.proveedor}</td>
                                                                <td className="px-4 py-2 font-mono font-bold text-slate-700 text-[10px]">{row.loteMadre}</td>
                                                                <td className="px-4 py-2 font-black text-indigo-600 text-sm text-right">{row.kg} kg</td>
                                                                <td className="px-4 py-2 font-black text-emerald-600 text-sm text-right">{showAcum} kg</td>
                                                                <td className="px-4 py-2 text-center">
                                                                    <div className="flex justify-center gap-1 items-center">
                                                                        <button onClick={() => startEdit(row)} className="text-amber-500 bg-amber-50 hover:bg-amber-100 p-2 rounded-lg font-bold text-xs">Editar</button>
                                                                        <button onClick={() => handlePreview(row)} className="text-indigo-500 bg-indigo-50 p-2 rounded-lg hover:bg-indigo-100"><Icon name="tag" size={16} /></button>
                                                                        <button onClick={() => removeRow(row.id)} className="text-red-500 bg-red-50 p-2 rounded-lg hover:bg-red-100"><Icon name="trash" size={16} /></button>
                                                                    </div>
                                                                </td>
                                                            </tr>
                                                        );
                                                    });
                                                    
                                                    return renderedRows;
                                                })()}
                                            </tbody>
                                        </table></div>
                                    )}
                                </div>
                            </div>
                        </main>

                        <div className="bg-white border-t border-slate-200 p-3 md:p-4 flex flex-col md:flex-row justify-between items-center z-20 gap-3 shadow-[-10px_0_40px_rgba(0,0,0,0.05)] w-full">
                            <div className="flex flex-col items-center md:items-start w-full md:w-auto">
                                <span className="text-[10px] md:text-xs font-black text-slate-400 uppercase tracking-widest">TOTAL KILOS</span>
                                <span className="text-2xl md:text-3xl font-black text-indigo-900">{totalKg.toLocaleString('es-AR')} <span className="text-lg md:text-xl text-indigo-400">KG</span></span>
                            </div>
                            <button
                                onClick={() => setShowCloseModal(true)}
                                disabled={rows.length === 0}
                                className={`w-full md:w-auto justify-center px-6 md:px-8 py-3 md:py-4 rounded-2xl font-black text-base md:text-lg flex items-center gap-2 transition-all ${rows.length === 0
                                    ? 'bg-slate-200 text-slate-400 cursor-not-allowed'
                                    : 'bg-emerald-500 text-white hover:bg-emerald-600 shadow-lg shadow-emerald-500/20'
                                    }`}
                            >
                                <Icon name="printer" size={20} /> PROCESAR PDFs
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
