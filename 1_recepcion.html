<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1. Recepción de Bobinas - Molderil S.A.</title>

    <!-- Librerías -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        @media print {
            body { background: white !important; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .page-break { page-break-after: always !important; break-after: page !important; }
            .print-area { border: none !important; box-shadow: none !important; margin: 0 !important; padding: 0 !important; }
        }
        @page { margin: 0; size: A4 portrait; }
        input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; padding: 5px; }
        #reader-relabel button { background-color: #2563eb; color: white; padding: 10px 20px; border-radius: 8px; font-weight: bold; margin: 5px; cursor: pointer; border: none; }
        #reader-relabel select { padding: 10px; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 10px; width: 100%; }
        .th-resize { resize: horizontal; overflow: auto; position: relative; background-clip: padding-box; }
        .th-resize::-webkit-scrollbar { height: 0px; width: 0px; }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        const generateId = () => Date.now() + Math.random();
        const generateUID = () => {
            const now = new Date();
            const yy = String(now.getFullYear()).slice(-2);
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            const hh = String(now.getHours()).padStart(2, '0');
            const min = String(now.getMinutes()).padStart(2, '0');
            const ss = String(now.getSeconds()).padStart(2, '0');
            const ms = String(now.getMilliseconds()).padStart(3, '0');
            const rnd = Math.floor(Math.random() * 100).toString().padStart(2, '0');
            return `${dd}${mm}${yy}-${hh}${min}${ss}-${ms}${rnd}`;
        };

        const Icon = ({ name, size = 18 }) => {
            const paths = {
                plus: "M12 5v14M5 12h14",
                trash: "M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2",
                printer: "M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6z",
                tag: "M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82zM7 7h.01",
                upload: "M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12",
                close: "M18 6L6 18 M6 6l12 12",
                save: "M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z M17 21v-8H7v8 M7 3v5h8",
                folder: "M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z",
                edit: "M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7 M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z",
                box: "M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z M3.27 6.96L12 12.01l8.73-5.05 M12 22.08V12",
                sort: "M4 6h16M4 12h10M4 18h4",
                check: "M20 6L9 17l-5-5",
                arrowLeft: "M19 12H5M12 19l-7-7 7-7"
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d={paths[name]} />
                </svg>
            );
        };

        const QRCodeCanvas = ({ text, size = 140 }) => {
            const canvasRef = useRef(null);
            useEffect(() => {
                if (!canvasRef.current || !window.QRCode) return;
                canvasRef.current.innerHTML = '';
                new window.QRCode(canvasRef.current, {
                    text: text, width: size, height: size,
                    colorDark : "#000000", colorLight : "#ffffff",
                    correctLevel : window.QRCode.CorrectLevel.M
                });
            }, [text, size]);
            return <div ref={canvasRef} style={{ width: size, height: size }} title="QR Code Seguro" />;
        };

        const getQRCodeDataURL = (text) => {
            return new Promise((resolve) => {
                const div = document.createElement('div');
                new window.QRCode(div, { text: text, width: 256, height: 256, correctLevel: window.QRCode.CorrectLevel.M });
                setTimeout(() => {
                    const canvas = div.querySelector('canvas');
                    resolve(canvas.toDataURL('image/png'));
                }, 100);
            });
        };

        const drawBobinaLabelNative = async (doc, row, empresa, qrData) => {
            // A4 page is 210 x 297 mm
            // Border
            doc.setLineWidth(1.5);
            doc.rect(10, 10, 190, 277);

            // Header
            doc.setFont("helvetica", "bold");
            doc.setFontSize(40);
            doc.text(empresa, 105, 30, { align: "center" });
            
            doc.setFontSize(14);
            doc.setTextColor(100, 100, 100);
            doc.text("IDENTIFICACION DE BOBINA", 105, 40, { align: "center", charSpace: 2 });
            doc.setTextColor(0, 0, 0);

            doc.setLineWidth(0.5);
            doc.line(10, 48, 200, 48);

            // Row 1: Proveedor, SKU, Tipo // QR
            // Proveedor
            doc.setFontSize(11);
            doc.setTextColor(100, 100, 100);
            doc.text("PROVEEDOR", 15, 60);
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(26);
            doc.text(row.proveedor || 'S/D', 15, 70);

            // SKU
            doc.setFontSize(11);
            doc.setTextColor(100, 100, 100);
            doc.text("SKU / ARTICULO", 15, 90);
            doc.setTextColor(29, 78, 216); // text-blue-800
            doc.setFontSize(32);
            doc.text(row.sku || 'S/D', 15, 102);

            // Tipo
            doc.setFontSize(11);
            doc.setTextColor(100, 100, 100);
            doc.text("TIPO DE PAPEL", 15, 122);
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(24);
            const tipoLines = doc.splitTextToSize(row.tipo || 'S/D', 110);
            doc.text(tipoLines, 15, 132);

            // QR Code (Right side)
            doc.setDrawColor(200, 200, 200);
            doc.setLineDash([2, 2], 0);
            doc.rect(130, 58, 60, 75);
            doc.setLineDash([], 0);
            doc.setDrawColor(0, 0, 0);

            const qrImg = await getQRCodeDataURL(qrData);
            doc.addImage(qrImg, 'PNG', 135, 63, 50, 50);
            
            doc.setFont("helvetica", "bold");
            doc.setFontSize(10);
            doc.text("ID: " + row.uid, 160, 126, { align: "center" });

            // Row 2: Corte / Peso (Huge box)
            doc.setLineWidth(1.5);
            doc.line(10, 150, 200, 150);
            doc.line(10, 230, 200, 230);

            if (row.corte) {
                // Split in half
                doc.line(105, 150, 105, 230);

                // Corte
                doc.setFillColor(0, 0, 0);
                doc.rect(10, 150, 95, 80, 'F');
                doc.setTextColor(255, 255, 255);
                
                doc.setFontSize(14);
                doc.text("ANCHO HIJA", 57.5, 165, { align: "center", charSpace: 1 });
                
                doc.setFontSize(65);
                doc.text(row.corte, 50, 205, { align: "right" });
                doc.setFontSize(16);
                doc.text("mm", 55, 205);
                
                doc.setTextColor(0, 0, 0);

                // Peso Neto
                doc.setFontSize(14);
                doc.setTextColor(100, 100, 100);
                doc.text("PESO NETO", 152.5, 165, { align: "center", charSpace: 1 });
                doc.setTextColor(30, 58, 138); // text-blue-900
                
                doc.setFontSize(80);
                doc.text(row.kg.toString() || '0', 145, 210, { align: "right" });
                doc.setFontSize(18);
                doc.text("kg", 150, 210);
            } else {
                // Full Width Peso
                doc.setFontSize(16);
                doc.setTextColor(100, 100, 100);
                doc.text("PESO NETO", 105, 165, { align: "center", charSpace: 1 });
                doc.setTextColor(30, 58, 138);
                
                doc.setFontSize(100);
                doc.text(row.kg.toString() || '0', 105, 215, { align: "center" });
                doc.setFontSize(22);
                doc.text("kg", 170, 215);
            }

            doc.setTextColor(0, 0, 0);

            // Row 3: Detalles inferiores
            doc.setFontSize(10);
            doc.setTextColor(100, 100, 100);
            doc.text("GRAMAJE", 15, 242);
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(22);
            doc.text((row.gramaje || '---') + " gr", 15, 252);

            doc.setFontSize(10);
            doc.setTextColor(100, 100, 100);
            doc.text("ANCHO ORIG.", 70, 242);
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(22);
            doc.text((row.ancho || '---') + " mm", 70, 252);

            doc.setFontSize(10);
            doc.setTextColor(100, 100, 100);
            doc.text("LOTE PROV.", 130, 242);
            doc.setTextColor(0, 0, 0);
            doc.setFont("helvetica", "bold");
            doc.setFontSize(18);
            doc.text(row.loteMadre || 'N/A', 130, 252);

            doc.setFont("helvetica", "bold");
            doc.setFontSize(10);
            doc.setTextColor(100, 100, 100);
            doc.text("LOTE PROD.", 15, 267);
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(18);
            doc.text(row.loteHija || 'N/A', 15, 277);

            // Obs
            if (row.obs) {
                doc.setFontSize(8);
                doc.setTextColor(100, 100, 100);
                doc.text("OBSERVACIONES", 70, 267);
                doc.setTextColor(0, 0, 0);
                doc.setFontSize(12);
                const obsLines = doc.splitTextToSize(row.obs, 120);
                doc.text(obsLines, 70, 274);
            }
        };

        const App = () => {
            const today = new Date().toISOString().split('T')[0];
            const empresa = "MOLDERIL S.A.";

            const [showCloseModal, setShowCloseModal] = useState(false);
            const [isAutoLoadingDB, setIsAutoLoadingDB] = useState(true);

            // Funciones de audio
            const playSuccessSound = () => {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.type = 'sine'; osc.frequency.setValueAtTime(880, ctx.currentTime);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                osc.start(); osc.stop(ctx.currentTime + 0.1);
            };

            const [rows, setRows] = useState(() => {
                const saved = localStorage.getItem('molderilRows');
                if (saved) {
                    try { 
                        const parsed = JSON.parse(saved); 
                        if (Array.isArray(parsed)) return parsed;
                    } catch (e) {}
                }
                return [{ id: generateId(), uid: generateUID(), fecha: today, proveedor: '', tipo: '', gramaje: '', ancho: '', sku: '', corte: '', kg: '', loteMadre: '', loteHija: '', obs: '' }];
            });

            const [activeDropdown, setActiveDropdown] = useState(null);
            const [isRelabelScanning, setIsRelabelScanning] = useState(false);
            const [previewRow, setPreviewRow] = useState(null);
            const [previewPdfUrl, setPreviewPdfUrl] = useState(null);

            const [insumosDB, setInsumosDB] = useState([]);

            const scannerRefRelabel = useRef(null);
            const lastRelabelScannedTime = useRef(0);

            const formatDateDisplay = (dateStr) => {
                if (!dateStr) return '--/--/----';
                const [year, month, day] = dateStr.split('-');
                return `${day}/${month}/${year}`;
            };
            const unformatDateDisplay = (displayStr) => {
                if (!displayStr || displayStr.includes('--')) return today;
                const [day, month, year] = displayStr.split('/');
                return `${year}-${month}-${day}`;
            };

            // Auto-guardado
            useEffect(() => { localStorage.setItem('molderilRows', JSON.stringify(rows)); }, [rows]);

            // Auto-cargado de BOBINAS.xlsx
            useEffect(() => {
                const cargarBaseDatosAutomatica = async () => {
                    try {
                        const response = await fetch('./BOBINAS.xlsx');
                        if (!response.ok) throw new Error("No se pudo hallar archivo");
                        const arrayBuffer = await response.arrayBuffer();
                        const dataBytes = new Uint8Array(arrayBuffer);
                        const wb = XLSX.read(dataBytes, { type: 'array' });
                        const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, defval: '' });
                        const parsed = [];
                        for (let i = 1; i < data.length; i++) {
                            const rowData = data[i];
                            if (Array.isArray(rowData) && rowData.join("").trim() !== "") {
                                parsed.push({
                                    proveedor: String(rowData[0] || '').trim().toUpperCase(),
                                    sku: String(rowData[1] || '').trim().toUpperCase(),
                                    tipo: String(rowData[2] || '').trim().toUpperCase(),
                                    gramaje: String(rowData[3] || '').trim().toUpperCase(),
                                    ancho: String(rowData[4] || '').trim().toUpperCase()
                                });
                            }
                        }
                        if (parsed.length > 0) {
                            setInsumosDB(parsed);
                            console.log("Base cargada automáticamente:", parsed.length, "ítems");
                        }
                    } catch (error) {
                        console.warn("Autocarga excel fallida. Usar botón manual.", error);
                    } finally {
                        setIsAutoLoadingDB(false);
                    }
                };
                cargarBaseDatosAutomatica();
            }, []);

            const totalKg = useMemo(() => (Array.isArray(rows) ? rows : []).reduce((acc, r) => acc + (parseFloat(String((r && r.kg) || '').replace(',', '.')) || 0), 0), [rows]);

            const subtotalesPorSKU = useMemo(() => {
                const map = {};
                (Array.isArray(rows) ? rows : []).forEach(r => {
                    if (!r || !r.kg) return;
                    const key = r.sku || 'Sin SKU';
                    if (!map[key]) map[key] = { sku: key, proveedor: r.proveedor, tipo: r.tipo, count: 0, kg: 0 };
                    map[key].count += 1;
                    map[key].kg += (parseFloat(String(r.kg || '').replace(',', '.')) || 0);
                });
                return Object.values(map).sort((a, b) => a.sku.localeCompare(b.sku));
            }, [rows]);

            const updateRow = (id, field, value) => {
                const upperValue = (typeof value === 'string' && field !== 'fecha') ? value.toUpperCase() : value;
                setRows(prevRows => prevRows.map(r => r.id === id ? { ...r, [field]: upperValue } : r));
            };

            const addRow = () => setRows([...rows, { id: generateId(), uid: generateUID(), fecha: today, proveedor: '', tipo: '', gramaje: '', ancho: '', sku: '', corte: '', kg: '', loteMadre: '', loteHija: '', obs: '' }]);
            const removeRow = (id) => { 
                if (rows.length > 1) setRows(rows.filter(r => r.id !== id));
                else setRows([{ id: generateId(), uid: generateUID(), fecha: today, proveedor: '', tipo: '', gramaje: '', ancho: '', sku: '', corte: '', kg: '', loteMadre: '', loteHija: '', obs: '' }]);
            };

            const sortBobinas = () => {
                const sorted = [...rows].sort((a, b) => {
                    const skuA = (a.sku || '').toLowerCase(); const skuB = (b.sku || '').toLowerCase();
                    if (skuA < skuB) return -1; if (skuA > skuB) return 1;
                    const loteA = (a.loteHija || '').toLowerCase(); const loteB = (b.loteHija || '').toLowerCase();
                    if (loteA < loteB) return -1; if (loteA > loteB) return 1;
                    return 0;
                });
                setRows(sorted);
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const dataBytes = new Uint8Array(evt.target.result);
                        const wb = XLSX.read(dataBytes, { type: 'array' });
                        const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, defval: '' });
                        const parsed = [];
                        for (let i = 1; i < data.length; i++) {
                            const rowData = data[i];
                            if (Array.isArray(rowData) && rowData.join("").trim() !== "") {
                                parsed.push({
                                    proveedor: String(rowData[0] || '').trim().toUpperCase(),
                                    sku: String(rowData[1] || '').trim().toUpperCase(),
                                    tipo: String(rowData[2] || '').trim().toUpperCase(),
                                    gramaje: String(rowData[3] || '').trim().toUpperCase(),
                                    ancho: String(rowData[4] || '').trim().toUpperCase()
                                });
                            }
                        }
                        if (parsed.length > 0) { setInsumosDB(parsed); alert(`Se cargaron ${parsed.length} insumos mediante el botón manual.`); }
                    } catch (error) { alert("Error al leer el Excel."); }
                    e.target.value = null;
                };
                reader.readAsArrayBuffer(file);
            };

            const exportarProyecto = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(rows));
                const a = document.createElement('a');
                a.setAttribute("href", dataStr);
                a.setAttribute("download", `Proyecto_Ingresos_${formatDateDisplay(today).replace(/\//g, '-')}.json`);
                document.body.appendChild(a); a.click(); a.remove();
            };

            const importarProyecto = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const imported = JSON.parse(evt.target.result);
                        const sanitized = imported.map(r => ({ ...r, uid: r.uid || generateUID() }));
                        if (Array.isArray(sanitized)) { setRows(sanitized); alert("Lista cargada."); }
                    } catch (error) { alert("Archivo inválido."); }
                    e.target.value = null;
                };
                reader.readAsText(file);
            };

            const procesarCierreLista = () => {
                const validRows = rows.filter(r => r.proveedor || r.kg);
                if (validRows.length === 0) { alert("La planilla está vacía."); setShowCloseModal(false); return; }

                const invalidRows = validRows.filter(r => !r.proveedor || !r.kg || !r.tipo);
                if (invalidRows.length > 0) {
                    alert(`Hay ${invalidRows.length} fila(s) incompleta(s). Completa Proveedor, Tipo y Kg.`);
                    setShowCloseModal(false); return;
                }

                setShowCloseModal(false);

                setTimeout(async () => {
                    try {
                        // Dibujo Nativo de etiquetas
                        for (let i = 0; i < validRows.length; i++) {
                            const row = validRows[i];
                            doc.addPage('a4', 'portrait');
                            const qrData = `MOLDERIL SA | UID: ${row.uid} | PROV: ${row.proveedor} | TIPO: ${row.tipo} | FECHA: ${formatDateDisplay(row.fecha)} | KG: ${row.kg} | L.PROV: ${row.loteMadre} | L.PROD: ${row.loteHija} | A.HIJA: ${row.corte} | SKU: ${row.sku} | GRAMAJE: ${row.gramaje} | ANCHO: ${row.ancho}`;
                            await drawBobinaLabelNative(doc, row, empresa, qrData);
                        }

                        doc.save(`Impresion_Logistica_${formatDateDisplay(today).replace(/\//g, '-')}.pdf`);
                        
                    } catch (err) {
                        console.error(err); alert("Hubo un error al generar el PDF.");
                    }
                }, 100);
            };

            const closeRelabelScanner = () => {
                if (scannerRefRelabel.current) {
                    scannerRefRelabel.current.clear().then(() => {
                        scannerRefRelabel.current = null; setIsRelabelScanning(false);
                    }).catch(() => {
                        scannerRefRelabel.current = null; setIsRelabelScanning(false);
                    });
                } else { setIsRelabelScanning(false); }
            };

            useEffect(() => {
                if (isRelabelScanning) {
                    scannerRefRelabel.current = new Html5QrcodeScanner("reader-relabel", { fps: 10, qrbox: { width: 250, height: 250 } }, false);
                    scannerRefRelabel.current.render(
                        (decodedText) => {
                            if (Date.now() - lastRelabelScannedTime.current < 2000) return;
                            lastRelabelScannedTime.current = Date.now();

                            if (decodedText.startsWith("MOLDERIL SA")) {
                                const parts = decodedText.split(" | ");
                                let newRow = { id: generateId(), uid: generateUID(), fecha: today, proveedor: '', tipo: '', gramaje: '', ancho: '', sku: '', corte: '', kg: '', loteMadre: '', loteHija: '', obs: 'Re-etiquetado' };
                                parts.forEach(p => {
                                    if (p.startsWith("PROV: ")) newRow.proveedor = p.replace("PROV: ", "");
                                    if (p.startsWith("TIPO: ")) newRow.tipo = p.replace("TIPO: ", "");
                                    if (p.startsWith("KG: ")) newRow.kg = p.replace("KG: ", "");
                                    if (p.startsWith("L.PROV: ")) newRow.loteMadre = p.replace("L.PROV: ", "");
                                    if (p.startsWith("L.PROD: ")) newRow.loteHija = p.replace("L.PROD: ", "");
                                    if (p.startsWith("A.HIJA: ")) newRow.corte = p.replace("A.HIJA: ", "");
                                    if (p.startsWith("SKU: ")) newRow.sku = p.replace("SKU: ", "");
                                    if (p.startsWith("GRAMAJE: ")) newRow.gramaje = p.replace("GRAMAJE: ", "");
                                    if (p.startsWith("ANCHO: ")) newRow.ancho = p.replace("ANCHO: ", "");
                                    if (p.startsWith("FECHA: ")) newRow.fecha = unformatDateDisplay(p.replace("FECHA: ", ""));
                                });
                                setRows(prev => [...prev, newRow]);
                                playSuccessSound(); closeRelabelScanner();
                            }
                        }, () => {}
                    );
                }
            }, [isRelabelScanning]);

            const handlePreview = (row) => {
                setPreviewRow(row);
                setPreviewPdfUrl(null);
                setTimeout(async () => {
                    try {
                        const doc = new window.jspdf.jsPDF('p', 'mm', 'a4');
                        const qrData = `MOLDERIL SA | UID: ${row.uid} | PROV: ${row.proveedor} | TIPO: ${row.tipo} | FECHA: ${formatDateDisplay(row.fecha)} | KG: ${row.kg} | L.PROV: ${row.loteMadre} | L.PROD: ${row.loteHija} | A.HIJA: ${row.corte} | SKU: ${row.sku} | GRAMAJE: ${row.gramaje} | ANCHO: ${row.ancho}`;
                        await drawBobinaLabelNative(doc, row, empresa, qrData);
                        setPreviewPdfUrl(URL.createObjectURL(doc.output('blob')));
                    } catch (err) { console.error("Error al previsualizar", err); }
                }, 100);
            };

            return (
                <div className="min-h-screen bg-slate-50 text-slate-800 font-sans">
                    {/* MODAL CERRAR LISTA (Procesar PDF) */}
                    {showCloseModal && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex flex-col justify-center items-center p-4 no-print transition-all">
                            <div className="bg-white p-8 rounded-3xl w-full max-w-lg text-center shadow-2xl border border-slate-200">
                                <div className="bg-emerald-100 text-emerald-600 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <Icon name="printer" size={40} />
                                </div>
                                <h3 className="font-black text-2xl tracking-tight text-slate-900 mb-3">Emitir Pallet y Rótulos</h3>
                                <p className="text-slate-500 mb-8 font-medium">
                                    Esta acción agrupará las bobinas en un PDF de alta calidad listo para imprimir. Recibirás tu hoja A4 de resumen y los rótulos individuales a pegar.
                                </p>
                                <div className="flex gap-4">
                                    <button onClick={() => setShowCloseModal(false)} className="flex-1 bg-slate-100 text-slate-700 px-5 py-4 rounded-2xl font-bold hover:bg-slate-200 transition-colors">Cancelar</button>
                                    <button onClick={procesarCierreLista} className="flex-1 bg-emerald-600 text-white px-5 py-4 rounded-2xl font-bold hover:bg-emerald-700 shadow-xl shadow-emerald-600/30 transition-all active:scale-95">Confirmar e Imprimir</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* NAVBAR (Sleek SaaS style) */}
                    <nav className="bg-slate-900 shadow-md px-6 py-4 no-print flex justify-between items-center sm:sticky top-0 z-40 border-b border-slate-800">
                        <div className="flex items-center gap-3">
                            <div className="bg-indigo-500/20 p-2 rounded-lg text-indigo-400">
                                <Icon name="box" size={24} />
                            </div>
                            <div>
                                <span className="text-white text-lg font-black tracking-tight uppercase block leading-none">Recepción Logística</span>
                                <span className="text-indigo-400 text-[10px] font-bold uppercase tracking-widest">{empresa}</span>
                            </div>
                        </div>
                        <a href="index.html" className="text-slate-300 hover:text-white font-semibold text-sm bg-slate-800/50 hover:bg-slate-800 px-5 py-2.5 rounded-xl flex items-center gap-2 border border-slate-700 hover:border-slate-600 transition-all">
                            <Icon name="arrowLeft" size={16} /> <span className="hidden sm:inline">Volver al Menú</span>
                        </a>
                    </nav>

                    <div className="max-w-[320mm] mx-auto p-4 sm:p-6 lg:p-8">
                        {/* PREVIEW */}
                        {previewRow && (
                            <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-sm z-50 flex flex-col justify-center items-center p-4 no-print">
                                <div className="bg-slate-100 p-2 sm:p-4 rounded-3xl w-full max-w-[220mm] h-[90vh] flex flex-col relative shadow-2xl overflow-hidden border border-slate-300">
                                    <div className="flex justify-between items-center mb-3 bg-white p-4 rounded-2xl shadow-sm">
                                        <h3 className="font-extrabold text-lg text-slate-800 uppercase flex items-center gap-2 tracking-tight"><Icon name="tag" /> Vista Previa del Rótulo</h3>
                                        <button onClick={() => { setPreviewRow(null); setPreviewPdfUrl(null); }} className="bg-slate-200 text-slate-600 hover:bg-slate-300 hover:text-slate-900 w-10 h-10 rounded-xl font-bold flex items-center justify-center transition-colors">✕</button>
                                    </div>
                                    <div className="flex-1 w-full bg-slate-200/50 rounded-2xl overflow-hidden relative flex justify-center items-center">
                                        {previewPdfUrl ? (
                                            <iframe src={previewPdfUrl} className="w-full h-full border-none rounded-xl" title="Preview"></iframe>
                                        ) : (
                                            <div className="flex flex-col items-center text-indigo-600 animate-pulse">
                                                <Icon name="printer" size={48} className="mb-4 opacity-50" />
                                                <span className="font-bold tracking-tight">Procesando vectores PDF...</span>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* RE-ETIQUETAR MODAL */}
                        {isRelabelScanning && (
                            <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-sm z-50 flex flex-col justify-center items-center p-4 no-print">
                                <div className="bg-white p-6 rounded-3xl w-full max-w-md text-center shadow-2xl border border-slate-200">
                                    <div className="bg-indigo-100 text-indigo-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                                        <Icon name="camera" size={32} />
                                    </div>
                                    <h3 className="font-black text-xl tracking-tight mb-2">Escanear Rótulo Original</h3>
                                    <p className="text-slate-500 mb-6 text-sm font-medium">Apunta con tu cámara al código QR impreso en el papel averiado para clonar sus datos a una nueva fila.</p>
                                    <div id="reader-relabel" className="w-full rounded-2xl overflow-hidden border-2 border-indigo-100"></div>
                                    <button onClick={closeRelabelScanner} className="mt-6 bg-slate-100 text-slate-700 hover:bg-slate-200 px-6 py-4 rounded-2xl font-bold w-full transition-colors">Cancelar Módulo</button>
                                </div>
                            </div>
                        )}

                        {/* CONTROLES TOP (DASHBOARD HEADER) */}
                        <div className="mb-6 flex flex-wrap gap-4 items-center justify-between no-print">
                            <div className="flex flex-wrap gap-3 items-center bg-white p-2 rounded-2xl shadow-sm border border-slate-200">
                                <input type="file" id="json-upload" accept=".json" className="hidden" onChange={importarProyecto} />
                                <button onClick={() => document.getElementById('json-upload').click()} className="text-slate-600 px-4 py-2.5 rounded-xl font-bold flex items-center gap-2 hover:bg-slate-50 hover:text-slate-900 text-sm transition-colors">
                                    <Icon name="folder" /> <span className="hidden sm:inline">Cargar Sesión</span>
                                </button>
                                <div className="w-px h-6 bg-slate-200"></div>
                                <button onClick={() => setIsRelabelScanning(true)} className="text-indigo-600 bg-indigo-50 px-4 py-2.5 rounded-xl font-bold flex items-center gap-2 hover:bg-indigo-100 text-sm transition-colors">
                                    <Icon name="camera" /> Copiar Rótulo
                                </button>
                                {isAutoLoadingDB && <span className="text-xs font-bold text-amber-500 animate-pulse ml-2 px-3">Cargando base...</span>}
                                {insumosDB.length === 0 && !isAutoLoadingDB && (
                                    <div className="ml-2">
                                        <input type="file" id="excel-upload" accept=".xlsx, .xls" className="hidden" onChange={handleFileUpload} />
                                        <button onClick={() => document.getElementById('excel-upload').click()} className="px-4 py-2 bg-amber-100 text-amber-800 text-xs font-bold rounded-xl flex items-center gap-2">
                                            ⚠️ Cargar Insumos Manualmente
                                        </button>
                                    </div>
                                )}
                            </div>

                            <div className="flex gap-3">
                                <button onClick={exportarProyecto} className="bg-white border text-slate-700 px-4 py-2.5 rounded-2xl font-bold flex items-center gap-2 hover:bg-slate-50 shadow-sm transition-colors text-sm">
                                    <Icon name="save" /> Descargar Avance
                                </button>
                                <button onClick={() => { if (window.confirm("¿Seguro de descartar tu progreso permanentemente?")) { localStorage.removeItem('molderilRows'); window.location.reload(); } }} className="bg-red-50 text-red-600 px-4 py-2.5 rounded-2xl font-bold flex items-center gap-2 hover:bg-red-100 transition-colors text-sm">
                                    <Icon name="trash" /> Borrar Caché
                                </button>
                            </div>
                        </div>

                        {/* DATA GRID ESTILO SAAS */}
                        <div className="bg-white shadow-sm border border-slate-200 rounded-3xl overflow-hidden no-print">
                            <div className={`w-full overflow-x-auto ${activeDropdown ? 'pb-[320px]' : 'pb-0'} transition-all duration-300 ease-in-out`}>
                                <table className="w-full text-left whitespace-nowrap min-w-max">
                                    <thead className="bg-slate-50 border-b border-slate-200">
                                        <tr>
                                            <th className="px-3 py-4 text-[10px] font-black text-slate-400 uppercase tracking-wider">FECHA</th>
                                            <th className="px-3 py-4 text-[10px] font-black text-slate-400 uppercase tracking-wider">SKU / ARTÍCULO</th>
                                            <th className="px-3 py-4 text-[10px] font-black text-slate-400 uppercase tracking-wider">TIPO DE PAPEL</th>
                                            <th className="px-3 py-4 text-[10px] font-black text-slate-400 uppercase tracking-wider">GRAMAJE</th>
                                            <th className="px-3 py-4 text-[10px] font-black text-slate-400 uppercase tracking-wider">ANCHO ORIG.</th>
                                            <th className="px-3 py-4 text-[10px] font-black text-slate-400 uppercase tracking-wider">PROVEEDOR</th>
                                            <th className="px-3 py-4 text-[10px] font-black text-slate-400 uppercase tracking-wider bg-slate-100/50">LOTE PROV.</th>
                                            <th className="px-3 py-4 text-[10px] font-black text-slate-400 uppercase tracking-wider bg-slate-100/50">LOTE PROD.</th>
                                            <th className="px-3 py-4 text-[10px] font-black text-slate-400 uppercase tracking-wider">ANCHO HIJA</th>
                                            <th className="px-3 py-4 text-[10px] font-black text-indigo-500 uppercase tracking-wider text-center">KILOS</th>
                                            <th className="px-3 py-4 text-[10px] font-black text-slate-400 uppercase tracking-wider text-center">ACCIONES</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {rows.map((row, index) => (
                                            <tr key={row.id} className="group hover:bg-slate-50/80 focus-within:bg-indigo-50/30 transition-colors">
                                                <td className="px-1 py-1">
                                                    <input type="date" className="w-full h-10 px-2 rounded-lg border-2 border-transparent focus:border-indigo-300 focus:bg-white outline-none text-[11px] font-medium text-slate-700 bg-transparent transition-all cursor-pointer" value={row.fecha} onChange={e => updateRow(row.id, 'fecha', e.target.value)} />
                                                </td>
                                                {['sku', 'tipo', 'gramaje', 'ancho', 'proveedor'].map(field => (
                                                    <td key={field} className="px-1 py-1 relative">
                                                        <input
                                                            className={`w-full h-10 px-3 rounded-lg border-2 border-transparent focus:border-indigo-400 focus:bg-white outline-none bg-transparent transition-all uppercase placeholder-slate-300
                                                                ${field === 'sku' ? 'text-[12px] font-black text-indigo-900 tracking-tight min-w-[200px]' : 'text-[11px] font-semibold text-slate-700'}
                                                                ${field === 'proveedor' ? 'bg-slate-50/50 min-w-[150px]' : 'min-w-[120px]'}`}
                                                            value={row[field]}
                                                            onChange={e => updateRow(row.id, field, e.target.value)}
                                                            onFocus={() => setActiveDropdown({ id: row.id, field: field })}
                                                            onBlur={() => setTimeout(() => setActiveDropdown(null), 250)}
                                                            placeholder={field === 'sku' ? "BUSCAR..." : ""}
                                                        />
                                                        {activeDropdown?.id === row.id && activeDropdown?.field === field && (
                                                            <div className="absolute z-[999] left-1 top-11 mt-1 w-[360px] bg-white/95 backdrop-blur-xl border border-slate-200 shadow-2xl shadow-indigo-900/10 rounded-xl max-h-[300px] overflow-y-auto no-print">
                                                                {insumosDB.filter(item => {
                                                                    const norm = (str) => String(str || '').normalize("NFD").replace(/[̀-ͯ]/g, "").trim().toUpperCase();
                                                                    let match = true;
                                                                    const q = norm(row[field]);
                                                                    if (q) match = match && norm(item[field]).includes(q);
                                                                    
                                                                    // Filtro Inteligente cruzado: Si es Proveedor y hay SKU, sugerir solo quienes vendan el SKU
                                                                    if (field === 'proveedor' && row.sku) {
                                                                        match = match && norm(item.sku) === norm(row.sku);
                                                                    }
                                                                    return match;
                                                                }).filter((item, idx, self) => idx === self.findIndex(t => t[field] === item[field]))
                                                                .map((item, idx) => (
                                                                    <div key={idx} className="p-3 hover:bg-indigo-50 border-b border-slate-50 cursor-pointer transition-colors" onMouseDown={(e) => {
                                                                        e.preventDefault(); // Evita que el onBlur se dispare antes del click
                                                                        if (field === 'proveedor') {
                                                                            updateRow(row.id, 'proveedor', item.proveedor); 
                                                                        } else if (field === 'sku' || field === 'tipo') {
                                                                            updateRow(row.id, 'sku', item.sku); 
                                                                            updateRow(row.id, 'tipo', item.tipo);
                                                                            updateRow(row.id, 'gramaje', item.gramaje); 
                                                                            updateRow(row.id, 'ancho', item.ancho); 
                                                                            updateRow(row.id, 'proveedor', item.proveedor);
                                                                        } else {
                                                                            updateRow(row.id, field, item[field]);
                                                                        }
                                                                        setActiveDropdown(null);
                                                                    }}>
                                                                        <div className="flex justify-between items-center mb-1">
                                                                            <span className="font-extrabold text-indigo-900 text-[12px] uppercase truncate tracking-tight">{item[field]}</span>
                                                                        </div>
                                                                        {field !== 'proveedor' && (
                                                                            <div className="text-slate-500 text-[10px] flex flex-col gap-0.5 uppercase mt-1">
                                                                                <span className="truncate"><b>{item.tipo}</b> - {item.gramaje}g - {item.ancho}mm</span>
                                                                                <span className="flex items-center gap-1"><Icon name="box" size={10}/> {item.proveedor}</span>
                                                                            </div>
                                                                        )}
                                                                        {field === 'proveedor' && (
                                                                             <div className="text-slate-500 text-[10px] uppercase mt-1">Vendedor habilitado para: {item.sku}</div>
                                                                        )}
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        )}
                                                    </td>
                                                ))}
                                                <td className="px-1 py-1 bg-slate-50/50 min-w-[140px]">
                                                    <input className="w-full h-10 px-3 rounded-lg border-2 border-transparent focus:border-indigo-300 focus:bg-white outline-none font-mono text-[11px] font-bold text-slate-700 bg-transparent transition-all uppercase placeholder-slate-300" placeholder="-" value={row.loteMadre} onChange={e => updateRow(row.id, 'loteMadre', e.target.value)} />
                                                </td>
                                                <td className="px-1 py-1 bg-slate-50/50 min-w-[140px]">
                                                    <input className="w-full h-10 px-3 rounded-lg border-2 border-transparent focus:border-indigo-300 focus:bg-white outline-none font-mono text-[11px] font-bold text-slate-700 bg-transparent transition-all uppercase placeholder-slate-300" placeholder="-" value={row.loteHija} onChange={e => updateRow(row.id, 'loteHija', e.target.value)} />
                                                </td>
                                                <td className="px-1 py-1 min-w-[100px]">
                                                    <input className="w-full h-10 px-3 rounded-lg border-2 border-transparent focus:border-indigo-300 focus:bg-white outline-none text-center font-bold text-[11px] text-slate-700 bg-transparent transition-all placeholder-slate-300" placeholder="-" value={row.corte} onChange={e => updateRow(row.id, 'corte', e.target.value)} />
                                                </td>
                                                <td className="px-1 py-1 bg-indigo-50/30 min-w-[100px]">
                                                    <input className="w-full h-10 px-3 rounded-lg border-2 border-transparent focus:border-indigo-500 focus:bg-white outline-none text-center font-black text-indigo-700 text-[13px] bg-transparent transition-all placeholder-indigo-300 shadow-sm" placeholder="KG..." value={row.kg} onChange={e => updateRow(row.id, 'kg', e.target.value)} />
                                                </td>
                                                <td className="px-3 py-1">
                                                    <div className="flex items-center justify-center gap-1 opacity-20 group-hover:opacity-100 focus-within:opacity-100 transition-opacity">
                                                        <button onClick={() => handlePreview(row)} className="text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 p-2 rounded-lg transition-colors" title="Vista Previa PDF"><Icon name="tag" size={16} /></button>
                                                        <button onClick={() => removeRow(row.id)} className="text-slate-500 hover:text-red-600 hover:bg-red-50 p-2 rounded-lg transition-colors" title="Borrar fila"><Icon name="trash" size={16} /></button>
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {/* ACCIONES INFERIORES Y TOTAL */}
                        <div className="mt-8 p-6 lg:p-8 rounded-3xl flex flex-col lg:flex-row justify-between items-center bg-white shadow-xl shadow-slate-200/50 border border-slate-100 gap-6 no-print">
                            <div className="flex gap-3 w-full lg:w-auto">
                                <button onClick={addRow} className="flex-1 lg:flex-none bg-indigo-600 text-white px-6 py-4 rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-indigo-700 shadow-lg shadow-indigo-600/20 active:scale-95 transition-all text-sm"><Icon name="plus" size={18} /> Añadir Fila</button>
                                <button onClick={sortBobinas} className="flex-1 lg:flex-none bg-slate-50 border border-slate-200 text-slate-700 px-6 py-4 rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-slate-100 active:scale-95 transition-all text-sm"><Icon name="sort" size={18} /> <span className="hidden sm:inline">Agrupar por SKU</span></button>
                            </div>
                            <div className="flex items-center gap-6 w-full lg:w-auto justify-between lg:justify-end border-t lg:border-t-0 lg:border-l-2 border-slate-100 pt-6 lg:pt-0 lg:pl-6">
                                <div className="text-right flex flex-col">
                                    <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">TOTAL ACUMULADO</span>
                                    <span className="text-4xl font-black text-indigo-900 tracking-tighter leading-none mt-1">{totalKg.toLocaleString('es-AR')} <span className="text-2xl text-indigo-400">KG</span></span>
                                </div>
                                <button onClick={() => setShowCloseModal(true)} className="bg-emerald-500 text-white px-8 py-5 rounded-2xl font-black flex justify-center items-center gap-3 hover:bg-emerald-600 shadow-2xl shadow-emerald-500/40 transition-all active:scale-95 text-lg">
                                    <Icon name="printer" size={24} /> PROCESAR PDFs
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
