<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos a Producción - Molderil S.A.</title>

    <!-- Librerías -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }

        /* Estilos específicos para impresión A4 Vertical */
        @media print {
            body {
                background: white !important;
            }

            .no-print {
                display: none !important;
            }

            .print-only {
                display: block !important;
            }

            /* Ajustes A4 Exactos */
            .print-area {
                width: 210mm !important;
                /* No forzamos alto, dejamos fluir el contenido de las tablas */
                margin: 0 auto !important;
                padding: 10mm !important;
                box-sizing: border-box !important;
                border: none !important;
                box-shadow: none !important;
            }

            /* Forzar tabla oscura en impresión (Tailwind descarta bg colors a veces) */
            th {
                background-color: #f3f4f6 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }

        @page {
            margin: 0;
            size: A4 portrait;
        }

        /* Esconder las flechitas feas de los inputs numericos */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const Icon = ({ name, size = 18 }) => {
            const paths = {
                upload: "M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12",
                printer: "M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6z",
                box: "M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z M3.27 6.96L12 12.01l8.73-5.05 M12 22.08V12",
                arrowRight: "M5 12h14M12 5l7 7-7 7",
                arrowLeft: "M19 12H5M12 19l-7-7 7-7",
                trash: "M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2",
                filter: "M22 3H2l8 9.46V19l4 2v-8.54L22 3z"
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d={paths[name]} />
                </svg>
            );
        };

        const App = () => {
            // Hoy, formato DD/MM/YYYY local
            const todayDate = new Date();
            const todayStr = String(todayDate.getDate()).padStart(2, '0') + '/' + String(todayDate.getMonth() + 1).padStart(2, '0') + '/' + todayDate.getFullYear();

            // MODO DE TRABAJO: 'pedido' | 'devolucion'
            const [mode, setMode] = useState('pedido');

            // FILTROS
            const [selectedProveedor, setSelectedProveedor] = useState('TODOS');
            const [customDate, setCustomDate] = useState(todayStr);

            // BBDD CARGADA (El listado crudo del Excel)
            const [dbItems, setDbItems] = useState([]);

            // ESTADO DE CADA FILA (inputs del usuario)
            // { sku: { cantBobinas, kgEntregados, lotes } }
            // Y si es Pedido: { kgSolicitados }
            const [rowInputs, setRowInputs] = useState({});

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const dataBytes = new Uint8Array(evt.target.result);
                        const wb = XLSX.read(dataBytes, { type: 'array' });
                        const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, defval: '' });

                        const parsed = [];
                        for (let i = 1; i < data.length; i++) {
                            const rowData = data[i];
                            if (Array.isArray(rowData) && rowData.join("").trim() !== "") {
                                parsed.push({
                                    id: 'id_' + Math.random().toString(36).substr(2, 9),
                                    proveedor: String(rowData[0] || '').trim().toUpperCase(),
                                    sku: String(rowData[1] || '').trim().toUpperCase(),
                                    tipo: String(rowData[2] || '').trim().toUpperCase(),
                                    gramaje: String(rowData[3] || '').trim().toUpperCase(),
                                    ancho: String(rowData[4] || '').trim().toUpperCase()
                                });
                            }
                        }

                        if (parsed.length > 0) {
                            setDbItems(parsed);
                            // Limpiamos los inputs anteriores al cargar nueva data
                            setRowInputs({});
                            alert(`Excel procesado: ${parsed.length} artículos encontrados.`);
                        }
                    } catch (error) {
                        alert("Error al leer el Excel. Verifica que tenga este orden de columnas: Prov, SKU, Tipo, Gramaje, Ancho.");
                    }
                    e.target.value = null; // reset permitiendo subir el mismo archivo de nuevo si hace falta
                };
                reader.readAsArrayBuffer(file);
            };

            // Filtrar los items base
            const filteredItems = useMemo(() => {
                if (selectedProveedor === 'TODOS') return dbItems;
                return dbItems.filter(item => item.proveedor === selectedProveedor);
            }, [dbItems, selectedProveedor]);

            // Proveedores únicos para el filtro
            const listProveedores = useMemo(() => {
                const provs = dbItems.map(i => i.proveedor).filter(p => p !== '');
                return [...new Set(provs)].sort();
            }, [dbItems]);

            // Modificar inputs de una fila concreta (usamos el SKU como llave principal para que los inputs no se mezclen mucho al re-filtrar, aunque usar ID unico es más seguro si hay SKUs repetidos accidentalmente en el excel. Usaremos ID)
            const handleInputChange = (id, field, value) => {
                setRowInputs(prev => ({
                    ...prev,
                    [id]: {
                        ...prev[id],
                        [field]: value
                    }
                }));
            };

            // Generador CSS Dinámico
            const themeColor = mode === 'pedido' ? 'emerald' : 'amber';

            return (
                <div className="min-h-screen pb-10">

                    {/* TOP NAVBAR (NO IMPRIMIBLE) */}
                    <div className="bg-white shadow-md border-b border-gray-200 no-print sticky top-0 z-40">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between items-center h-16">
                                <div className="flex items-center gap-3 font-black text-xl tracking-tighter text-gray-800">
                                    <Icon name="box" size={24} /> ALMACÉN PRODUCCIÓN
                                </div>
                                <div className="flex gap-4 h-full py-3">
                                    <button
                                        onClick={() => setMode('pedido')}
                                        className={`flex items-center gap-2 px-4 py-2 rounded-lg font-bold transition-all ${mode === 'pedido' ? 'bg-emerald-100 text-emerald-800 border-2 border-emerald-500' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}
                                    >
                                        <Icon name="arrowRight" /> Pedido de Producción
                                    </button>
                                    <button
                                        onClick={() => setMode('devolucion')}
                                        className={`flex items-center gap-2 px-4 py-2 rounded-lg font-bold transition-all ${mode === 'devolucion' ? 'bg-amber-100 text-amber-800 border-2 border-amber-500' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}
                                    >
                                        <Icon name="arrowLeft" /> Devolución a Depósito
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* CONTROLES (NO IMPRIMIBLES) */}
                    <div className="max-w-[210mm] mx-auto mt-8 mb-4 flex flex-col sm:flex-row gap-4 justify-between items-end bg-white p-6 rounded-xl shadow-md border border-gray-200 no-print">
                        <div className="flex-1 space-y-4">
                            <div>
                                <h3 className="text-sm font-bold text-gray-500 uppercase tracking-widest mb-2 flex items-center gap-2"><Icon name="upload" size={14} /> 1. Base de Datos</h3>
                                <div className="flex items-center gap-3">
                                    <input type="file" id="excel-upload" accept=".xlsx, .xls" className="hidden" onChange={handleFileUpload} />
                                    <button onClick={() => document.getElementById('excel-upload').click()} className={`bg-${themeColor}-600 text-white px-6 py-2 rounded-lg font-bold flex items-center gap-2 hover:bg-${themeColor}-700 shadow-md active:scale-95 transition-all w-full sm:w-auto`}>
                                        <Icon name="upload" /> Cargar Insumos (Excel)
                                    </button>
                                    {dbItems.length > 0 && <span className="text-sm font-bold text-gray-400 bg-gray-100 px-3 py-1 rounded-full">{dbItems.length} artículos leídos</span>}
                                </div>
                            </div>

                            {dbItems.length > 0 && (
                                <div>
                                    <h3 className="text-sm font-bold text-gray-500 uppercase tracking-widest mb-2 flex items-center gap-2"><Icon name="filter" size={14} /> 2. Filtros para la Hoja</h3>
                                    <div className="flex gap-4 items-center">
                                        <select
                                            value={selectedProveedor}
                                            onChange={(e) => setSelectedProveedor(e.target.value)}
                                            className="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full sm:w-[250px] p-2.5 font-bold"
                                        >
                                            <option value="TODOS">TODOS LOS PROVEEDORES</option>
                                            {listProveedores.map(p => <option key={p} value={p}>{p}</option>)}
                                        </select>

                                        <input
                                            type="text"
                                            value={customDate}
                                            onChange={(e) => setCustomDate(e.target.value)}
                                            placeholder="Fecha Manual (Ej: 15/10/2023)"
                                            className="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg w-[180px] p-2.5 font-bold text-center"
                                        />
                                    </div>
                                </div>
                            )}
                        </div>

                        {dbItems.length > 0 && (
                            <div className="flex flex-col gap-2 w-full sm:w-auto">
                                <button onClick={() => { if (window.confirm("Se borrarán los datos ingresados actualmente.")) setRowInputs({}); }} className="text-gray-400 hover:text-red-500 text-sm font-bold flex items-center gap-1 justify-end px-2">
                                    <Icon name="trash" size={14} /> Borrar Inputs
                                </button>
                                <button
                                    onClick={() => window.print()}
                                    className="bg-black text-white px-8 py-4 rounded-xl font-black text-lg flex items-center justify-center gap-3 hover:bg-gray-800 shadow-xl active:scale-95 transition-transform"
                                >
                                    <Icon name="printer" size={24} /> IMPRIMIR HOJA A4
                                </button>
                            </div>
                        )}
                    </div>

                    {/* MUESTRA INICIAL (SI NO HAY DATOS) */}
                    {dbItems.length === 0 && (
                        <div className="max-w-[210mm] mx-auto bg-white p-10 rounded-xl shadow border border-gray-200 text-center no-print">
                            <div className="bg-gray-100 text-gray-400 w-24 h-24 rounded-full flex flex-col items-center justify-center mx-auto mb-4">
                                <Icon name="box" size={40} />
                            </div>
                            <h2 className="text-2xl font-black text-gray-800 mb-2">Aún no hay insumos cargados</h2>
                            <p className="text-gray-500">Carga el mismo Excel que utilizas en la generación de rótulos de bobinas para que el sistema liste todos los tipos de papel disponibles.</p>
                        </div>
                    )}

                    {/* LIENZO DE IMPRESIÓN A4 */}
                    {dbItems.length > 0 && (
                        <div className="print-area bg-white mx-auto shadow-2xl border border-gray-300 relative w-[210mm] min-h-[297mm]">

                            {/* CABECERA DOCUMENTO */}
                            <div className={`border-b-4 ${mode === 'pedido' ? 'border-emerald-600' : 'border-amber-500'} pb-4 mb-6 flex justify-between items-end`}>
                                <div>
                                    <h1 className="text-3xl font-black tracking-tighter text-gray-900 uppercase">Lista de Materiales</h1>
                                    <h2 className={`text-xl font-bold uppercase tracking-widest ${mode === 'pedido' ? 'text-emerald-600' : 'text-amber-600'}`}>
                                        {mode === 'pedido' ? '📝 Pedido de Producción' : '↩️ Devolución de Materiales'}
                                    </h2>
                                </div>
                                <div className="text-right">
                                    <p className="text-[10px] font-bold text-gray-500 uppercase tracking-widest">{mode === 'pedido' ? 'Fecha de Solicitud' : 'Fecha de Devolución'}</p>
                                    <p className="text-xl font-black font-mono">{customDate}</p>
                                </div>
                            </div>

                            {/* FILTRO ACTIVO EN IMPRESIÓN */}
                            {selectedProveedor !== 'TODOS' && (
                                <div className="mb-4 bg-gray-100 p-2 border-l-4 border-gray-800">
                                    <p className="text-xs uppercase font-bold text-gray-500 tracking-wider">Filtrando lista por proveedor:</p>
                                    <p className="text-lg font-black uppercase">{selectedProveedor}</p>
                                </div>
                            )}

                            {/* TABLA PRINCIPAL */}
                            <table className="w-full text-left border-collapse border border-gray-400">
                                <thead>
                                    <tr className="bg-gray-100 border-b-2 border-gray-800 text-[9px] uppercase tracking-wider text-gray-700">
                                        <th className="p-2 border border-gray-300 w-[15%]">Proveedor</th>
                                        <th className="p-2 border border-gray-300 w-[15%]">SKU</th>
                                        <th className="p-2 border border-gray-300 w-[20%]">Descripción (Papel)</th>

                                        {/* Solo para pedidos mostramos kilos totales solicitados */}
                                        {mode === 'pedido' && (
                                            <th className="p-2 border border-blue-400 bg-blue-50 text-blue-900 text-center w-[10%]">Kg Totales Solicitables</th>
                                        )}

                                        <th className="p-2 border border-gray-300 text-center w-[10%]">Cant.<br />Bobinas</th>
                                        <th className="p-2 border border-gray-300 text-center w-[10%]">Kg<br />Entregados</th>
                                        <th className="p-2 border border-gray-300 w-[20%]">Lotes<br />(Anotar Manual)</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredItems.map((item, index) => {
                                        const inputs = rowInputs[item.id] || {};
                                        // Formato combinado para Descripción
                                        const description = `${item.tipo} (${item.gramaje}gr de ${item.ancho}mm)`;

                                        return (
                                            <tr key={item.id} className="border-b border-gray-300 text-[10px] even:bg-gray-50">
                                                <td className="p-1 border-r border-gray-300 font-bold uppercase truncate max-w-[80px]">{item.proveedor}</td>
                                                <td className="p-1 border-r border-gray-300 font-mono font-bold text-blue-800">{item.sku}</td>
                                                <td className="p-1 border-r border-gray-300 text-[9px] font-bold text-gray-600 line-clamp-2">{description}</td>

                                                {/* INGRESO DE KG SOLICITADOS (Solo en Pedido) */}
                                                {mode === 'pedido' && (
                                                    <td className="p-0 border-r border-gray-300 border-b-2 border-b-blue-200 bg-blue-50/50">
                                                        <input
                                                            type="text"
                                                            placeholder="___ kg"
                                                            className="w-full h-full p-2 bg-transparent border-none text-center font-black text-blue-900 outline-blue-500 placeholder-blue-300"
                                                            value={inputs.kgSolicitados || ''}
                                                            onChange={(e) => handleInputChange(item.id, 'kgSolicitados', e.target.value)}
                                                        />
                                                    </td>
                                                )}

                                                {/* INGRESO DE CANT. BOBINAS */}
                                                <td className="p-0 border-r border-gray-300">
                                                    <input
                                                        type="text"
                                                        className="w-full h-full p-2 bg-transparent border-none text-center font-bold text-gray-800 outline-gray-300"
                                                        value={inputs.cantBobinas || ''}
                                                        onChange={(e) => handleInputChange(item.id, 'cantBobinas', e.target.value)}
                                                    />
                                                </td>

                                                {/* INGRESO DE KG ENTREGADOS */}
                                                <td className="p-0 border-r border-gray-300">
                                                    <input
                                                        type="text"
                                                        className="w-full h-full p-2 bg-transparent border-none text-center font-bold text-gray-800 outline-gray-300"
                                                        value={inputs.kgEntregados || ''}
                                                        onChange={(e) => handleInputChange(item.id, 'kgEntregados', e.target.value)}
                                                    />
                                                </td>

                                                {/* INGRESO DE LOTES (Campo Largo) */}
                                                <td className="p-0 border-r border-gray-300">
                                                    <input
                                                        type="text"
                                                        className="w-full h-full p-2 bg-transparent border-none font-mono text-[8px] uppercase text-gray-600 outline-gray-300"
                                                        value={inputs.lotes || ''}
                                                        onChange={(e) => handleInputChange(item.id, 'lotes', e.target.value)}
                                                    />
                                                </td>
                                            </tr>
                                        )
                                    })}
                                </tbody>
                            </table>

                            {/* BLOQUE DE FIRMAS */}
                            <div className="mt-16 flex justify-between px-8 text-center pt-8 border-t-2 border-dashed border-gray-300 break-inside-avoid">
                                <div className="w-[40%]">
                                    <p className="border-t border-black pt-2 font-bold uppercase text-xs tracking-widest text-gray-800 mb-1">
                                        Firma quien entrega
                                    </p>
                                    <p className="text-[10px] text-gray-500 italic">(Aclaración y Fecha)</p>
                                </div>
                                <div className="w-[40%]">
                                    <p className="border-t border-black pt-2 font-bold uppercase text-xs tracking-widest text-gray-800 mb-1">
                                        Firma quien recibe
                                    </p>
                                    <p className="text-[10px] text-gray-500 italic">(Aclaración y Fecha)</p>
                                </div>
                            </div>

                            <div className="absolute bottom-4 left-0 right-0 text-center text-[9px] text-gray-400 font-mono tracking-widest uppercase pb-2">
                                Molderil S.A. - Control Interno ({mode === 'pedido' ? 'REQ. PROD' : 'DEV. PROD'}) - {todayStr}
                            </div>

                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
