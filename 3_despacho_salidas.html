<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3. Despacho (Salidas) - Molderil S.A.</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        #reader-salidas button { background-color: #7c3aed; color: white; padding: 12px 24px; border-radius: 12px; font-weight: 800; margin: 5px; cursor: pointer; border: none; width: 100%; max-width: 300px; text-transform: uppercase; letter-spacing: 1px; }
        #reader-salidas select { padding: 12px; border-radius: 12px; border: 1px solid #ccc; margin-bottom: 10px; width: 100%; max-width: 300px; }
        #reader-salidas { border: none !important; }
        #reader-salidas img { display: none !important; }
        #reader-salidas__scan_region { border: 4px dashed #6b7280; border-radius: 12px; overflow: hidden; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 18 }) => {
            const paths = {
                camera: "M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z M9 13a3 3 0 1 0 6 0 3 3 0 1 0-6 0z",
                box: "M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z M3.27 6.96L12 12.01l8.73-5.05 M12 22.08V12",
                arrowLeft: "M19 12H5M12 19l-7-7 7-7",
                filePdf: "M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z M14 2v6h6 M16 13H8 M16 17H8 M10 9H8",
                upload: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12",
                trash: "M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2",
                check: "M20 6L9 17l-5-5",
                share: "M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8 M16 6l-4-4-4 4 M12 2v13",
                printer: "M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6z",
                tag: "M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82zM7 7h.01"
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d={paths[name]} />
                </svg>
            );
        };


        const getQRCodeDataURL = (text) => {
            return new Promise((resolve) => {
                const div = document.createElement('div');
                new window.QRCode(div, { text: text, width: 256, height: 256, correctLevel: window.QRCode.CorrectLevel.M });
                setTimeout(() => {
                    const canvas = div.querySelector('canvas');
                    resolve(canvas.toDataURL('image/png'));
                }, 100);
            });
        };

        const drawBobinaLabelNative = async (doc, row, empresa, qrData) => {
            doc.setLineWidth(1.5); doc.rect(10, 10, 190, 277);
            doc.setFont("helvetica", "bold"); doc.setFontSize(40); doc.text(empresa, 105, 23, { align: "center" });
            doc.setFontSize(14); doc.setTextColor(100, 100, 100); doc.text("IDENTIFICACION DE BOBINA", 105, 31, { align: "center", charSpace: 2 });
            doc.setTextColor(0, 0, 0); doc.setLineWidth(0.5); doc.line(10, 36, 200, 36);
            doc.setFontSize(14); doc.setTextColor(100, 100, 100); doc.text("TIPO DE PAPEL", 15, 45);
            doc.setTextColor(0, 0, 0); doc.setFontSize(45);
            const tipoLines = doc.splitTextToSize(row.tipo || 'S/D', 180);
            doc.text(tipoLines, 15, 58);
            const nextY = 58 + ((tipoLines.length - 1) * 16);
            const anchorY = Math.max(nextY + 8, 80);
            doc.line(10, anchorY, 200, anchorY);
            const midY = anchorY + 40; const bottomY = anchorY + 80;
            if (row.corte && row.corte.toString().trim() !== '') {
                doc.setFillColor(30, 41, 59); doc.rect(10, anchorY, 95, 80, 'F'); doc.setTextColor(255, 255, 255);
                doc.setFontSize(14); doc.text("ANCHO HIJA", 57.5, anchorY + 15, { align: "center", charSpace: 1 });
                doc.setFontSize(70); doc.text(String(row.corte), 57.5, midY + 15, { align: "center" });
                doc.setFontSize(16); doc.text("mm", 57.5, midY + 25, { align: "center" });
                doc.setTextColor(0, 0, 0); doc.setFontSize(14); doc.text("PESO NETO", 152.5, anchorY + 15, { align: "center", charSpace: 1 });
                doc.setTextColor(29, 78, 216); doc.setFontSize(90); doc.text(String(row.kg) || '0', 152.5, midY + 18, { align: "center" });
                doc.setFontSize(20); doc.text("kg", 152.5, midY + 30, { align: "center" });
            } else {
                doc.setFontSize(18); doc.setTextColor(100, 100, 100); doc.text("PESO NETO", 105, anchorY + 15, { align: "center", charSpace: 1 });
                doc.setTextColor(29, 78, 216); doc.setFontSize(120); doc.text(String(row.kg) || '0', 105, midY + 20, { align: "center" });
                doc.setFontSize(26); doc.text("kg", 180, midY + 15);
            }
            doc.setTextColor(0, 0, 0); doc.line(10, bottomY, 200, bottomY);
            const qrX = 140;
            doc.setFontSize(10); doc.setTextColor(100, 100, 100); doc.text("PROVEEDOR", 15, bottomY + 10);
            doc.setTextColor(0, 0, 0); doc.setFontSize(20); doc.text(doc.splitTextToSize(row.proveedor || 'S/D', 115), 15, bottomY + 18);
            doc.setFontSize(10); doc.setTextColor(100, 100, 100); doc.text("SKU / ARTICULO", 15, bottomY + 35);
            doc.setTextColor(0, 0, 0); doc.setFontSize(22); doc.text(doc.splitTextToSize(row.sku || 'S/D', 115), 15, bottomY + 43);
            doc.setFontSize(10); doc.setTextColor(100, 100, 100); doc.text("GRAMAJE", 15, bottomY + 65);
            doc.setTextColor(0, 0, 0); doc.setFontSize(18); doc.text((row.gramaje || '---') + " gr", 15, bottomY + 72);
            doc.setFontSize(10); doc.setTextColor(100, 100, 100); doc.text("ANCHO ORIG.", 70, bottomY + 65);
            doc.setTextColor(0, 0, 0); doc.setFontSize(18); doc.text((row.ancho || '---') + " mm", 70, bottomY + 72);
            doc.setFontSize(10); doc.setTextColor(100, 100, 100); doc.text("LOTE PROD.", 15, bottomY + 85);
            doc.setTextColor(0, 0, 0); doc.setFontSize(16); doc.text(row.loteHija || 'N/A', 15, bottomY + 92);
            doc.setFontSize(10); doc.setTextColor(100, 100, 100); doc.text("LOTE PROV.", 70, bottomY + 85);
            doc.setTextColor(0, 0, 0); doc.setFontSize(16); doc.text(row.loteMadre || 'N/A', 70, bottomY + 92);
            doc.setDrawColor(200, 200, 200);
            try {
                const qrImg = await getQRCodeDataURL(qrData);
                doc.addImage(qrImg, 'PNG', qrX, bottomY + 15, 50, 50);
            } catch(e) {}
            doc.setFontSize(8); doc.setTextColor(100, 100, 100); doc.text("ID: " + (row.uid||'-'), qrX + 25, bottomY + 70, { align: "center" });
        };

        const App = () => {
            const today = new Date().toISOString().split('T')[0];
            const formatDateDisplay = (dateStr) => {
                if (!dateStr) return '--/--/----';
                const [year, month, day] = dateStr.split('-');
                return `${day}/${month}/${year}`;
            };
            const unformatDateDisplay = (displayStr) => {
                if (!displayStr || displayStr.includes('--')) return today;
                const [day, month, year] = displayStr.split('/');
                return `${year}-${month}-${day}`;
            };

            const playSuccessSound = () => {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.type = 'sine'; osc.frequency.setValueAtTime(880, ctx.currentTime);
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                osc.start(); osc.stop(ctx.currentTime + 0.1);
            };

            const [isGeneratingPdf, setIsGeneratingPdf] = useState(false);
            const [showCloseModal, setShowCloseModal] = useState(false);
            const [showHelp, setShowHelp] = useState(false);
            const [insumosDB, setInsumosDB] = useState([]);
            const [isAutoLoadingDB, setIsAutoLoadingDB] = useState(true);
            const [scannedItems, setScannedItems] = useState(() => {
                const saved = localStorage.getItem('molderilScanned');
                if (saved) { try { return JSON.parse(saved); } catch (e) {} }
                return [];
            });
            const [isOutputScanning, setIsOutputScanning] = useState(false);
            const scannerRef = useRef(null);
            const lastScannedTime = useRef(0);

            useEffect(() => { localStorage.setItem('molderilScanned', JSON.stringify(scannedItems)); }, [scannedItems]);

            useEffect(() => {
                const cargarBaseDatosAutomatica = async () => {
                    try {
                        const response = await fetch('./BOBINAS.xlsx');
                        if (!response.ok) throw new Error("No se pudo hallar archivo");
                        const arrayBuffer = await response.arrayBuffer();
                        const wb = XLSX.read(new Uint8Array(arrayBuffer), { type: 'array' });
                        const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, defval: '' });
                        const parsed = [];
                        for (let i = 1; i < data.length; i++) {
                            const r = data[i];
                            if (Array.isArray(r) && r.join("").trim() !== "") {
                                parsed.push({
                                    proveedor: String(r[0] || '').trim().toUpperCase(),
                                    sku: String(r[1] || '').trim().toUpperCase(),
                                    tipo: String(r[2] || '').trim().toUpperCase(),
                                    gramaje: String(r[3] || '').trim().toUpperCase(),
                                    ancho: String(r[4] || '').trim().toUpperCase()
                                });
                            }
                        }
                        if (parsed.length > 0) setInsumosDB(parsed);
                    } catch (error) { console.warn("Error cargando BD", error); } finally { setIsAutoLoadingDB(false); }
                };
                cargarBaseDatosAutomatica();
            }, []);

            const closeOutputScanner = () => {
                if (scannerRef.current) {
                    scannerRef.current.clear().then(() => { scannerRef.current = null; setIsOutputScanning(false); })
                    .catch(() => { scannerRef.current = null; setIsOutputScanning(false); });
                } else { setIsOutputScanning(false); }
            };

            useEffect(() => {
                if (isOutputScanning) {
                    scannerRef.current = new Html5QrcodeScanner("reader-salidas", { fps: 10, qrbox: { width: 250, height: 250 } }, false);
                    scannerRef.current.render(
                        (decodedText) => {
                            if (Date.now() - lastScannedTime.current < 2000) return;
                            lastScannedTime.current = Date.now();

                            let isValid = false;
                            let parts = [];

                            if (decodedText.startsWith("MOLDERIL SA")) {
                                isValid = true;
                                parts = decodedText.split(" | ");
                            } else if (decodedText.startsWith("UID:") && decodedText.includes("SKU:")) {
                                isValid = true;
                                parts = decodedText.split("|");
                            }

                            if (isValid) {
                                let newItem = { uid: '', proveedor: '', tipo: '', kg: '', loteMadre: '', loteHija: '', corte: '', sku: '', gramaje: '', ancho: '', fecha: today };
                                parts.forEach(p => {
                                    if (p === "MOLDERIL SA") return;
                                    const idx = p.indexOf(":");
                                    if (idx === -1) return;
                                    const val = p.substring(idx + 1).trim();

                                    if (p.startsWith("UID:")) newItem.uid = val;
                                    else if (p.startsWith("PROV:")) newItem.proveedor = val;
                                    else if (p.startsWith("TIPO:")) newItem.tipo = val;
                                    else if (p.startsWith("KG:")) newItem.kg = val;
                                    else if (p.startsWith("L.PROV:")) newItem.loteMadre = val;
                                    else if (p.startsWith("L.PROD:")) newItem.loteHija = val;
                                    else if (p.startsWith("A.HIJA:")) newItem.corte = val;
                                    else if (p.startsWith("SKU:")) newItem.sku = val;
                                    else if (p.startsWith("GRAMAJE:")) newItem.gramaje = val;
                                    else if (p.startsWith("ANCHO:")) newItem.ancho = val;
                                    else if (p.startsWith("FECHA:")) newItem.fecha = val;
                                });

                                // Buscar datos base en caso de un QR simplificado sin gramaje/ancho
                                const norm = str => String(str || '').normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
                                if (newItem.sku && insumosDB.length > 0) {
                                    const exactMatch = insumosDB.find(item => norm(item.sku) === norm(newItem.sku));
                                    if (exactMatch) {
                                        if (!newItem.gramaje) newItem.gramaje = exactMatch.gramaje;
                                        if (!newItem.ancho) newItem.ancho = exactMatch.ancho;
                                    }
                                }

                                setScannedItems(prev => {
                                    if (prev.some(i => i.uid === newItem.uid)) return prev;
                                    playSuccessSound();
                                    return [newItem, ...prev];
                                });
                            }
                        }, () => {}
                    );
                }
                return () => {
                    if (scannerRef.current) {
                        scannerRef.current.clear().catch(console.error);
                    }
                };
            }, [isOutputScanning]);

            const removeScannedItem = (uid) => {
                setScannedItems(scannedItems.filter(i => i.uid !== uid));
            };

            const generarReporteSalida = (actionType) => {
                if (scannedItems.length === 0) return alert("No hay bobinas escaneadas.");
                setIsGeneratingPdf(true);
                const doc = new window.jspdf.jsPDF('p', 'mm', 'a4');
                const totalKg = scannedItems.reduce((acc, obj) => acc + (parseFloat(String(obj.kg).replace(',', '.')) || 0), 0);

                doc.setFontSize(22); doc.setFont("helvetica", "bold"); doc.text("MOLDERIL S.A.", 14, 20);
                doc.setFontSize(14); doc.setFont("helvetica", "normal"); doc.text("REPORTE DE SALIDAS (DESPACHO)", 14, 28);
                doc.setFontSize(10);
                doc.text(`Fecha Emisión: ${formatDateDisplay(today)}`, 14, 38);
                doc.text(`Cantidad Bobinas: ${scannedItems.length}`, 14, 44);
                
                doc.setFontSize(12); doc.setFont("helvetica", "bold");
                doc.setTextColor(124, 58, 237); // Violet-600
                doc.text(`TOTAL DESPACHADO: ${totalKg.toLocaleString('es-AR')} kg`, 100, 44);
                doc.setTextColor(0, 0, 0);

                doc.autoTable({
                    startY: 55,
                    head: [['ID Bobina (UID)', 'SKU', 'Tipo / Ancho', 'L. Mad', 'L. Hija', 'Kg Netos']],
                    body: scannedItems.map(r => [
                        r.uid, 
                        r.sku, 
                        `${r.tipo} (${r.ancho}mm)`, 
                        r.loteMadre || '-', 
                        r.loteHija || '-', 
                        `${r.kg}`
                    ]),
                    theme: 'grid',
                    headStyles: { fillColor: [109, 40, 217] }, // Violet-700
                    styles: { fontSize: 9 }
                });

                
                setTimeout(async () => {
                    try {
                        for (let i = 0; i < scannedItems.length; i++) {
                            doc.addPage('a4', 'portrait');
                            const r = scannedItems[i];
                            const qrData = `UID:${r.uid}|OP:DESPACHO|PROV:${r.proveedor}|TIPO:${r.tipo}|FECHA:${r.fecha||''}|KG:${r.kg}|L.PROV:${r.loteMadre}|L.PROD:${r.loteHija}|A.HIJA:${r.corte||''}|SKU:${r.sku}`;
                            await drawBobinaLabelNative(doc, r, "MOLDERIL S.A.", qrData);
                        }
                        const fileName = `Despacho_${formatDateDisplay(today).replace(/\//g, '-')}.pdf`;
                        // Siempre descargamos una copia local como respaldo
                        doc.save(fileName);
                        
                        if (actionType === 'share') {
                            if (navigator.canShare) {
                                try {
                                    const blob = doc.output('blob');
                                    const file = new File([blob], fileName, { type: 'application/pdf' });
                                    await navigator.share({
                                        title: 'Reporte Despacho a Producción',
                                        files: [file]
                                    });
                                } catch (e) { console.log("Compartir cancelado o fallo", e); }
                            } else {
                                alert("Tu navegador en PC no soporta abrir la ventana de compartir nativa. El documento se descargó exitosamente.");
                            }
                        }
                        
                        setScannedItems([]);
                        setShowCloseModal(false);
                        setIsGeneratingPdf(false);
                    } catch (err) {
                        console.error(err);
                        setIsGeneratingPdf(false);
                    }
                }, 100);
            };

            const exportarExcel = () => {
                if (scannedItems.length === 0) return alert("No hay datos para exportar.");
                const ws = window.XLSX.utils.json_to_sheet(scannedItems.map(item => ({
                    'ID Bobina (UID)': item.uid,
                    'Proveedor': item.proveedor,
                    'Tipo Papel': item.tipo,
                    'SKU/Artículo': item.sku,
                    'Gramaje': item.gramaje,
                    'Ancho Original': item.ancho,
                    'Lote Madre': item.loteMadre,
                    'Lote Hija': item.loteHija,
                    'Kg Netos': item.kg,
                    'Corte Resultante': item.corte
                })));
                const wb = window.XLSX.utils.book_new();
                window.XLSX.utils.book_append_sheet(wb, ws, "Salidas");
                window.XLSX.writeFile(wb, `Egresos_Deposito_${formatDateDisplay(today).replace(/\//g, '-')}.xlsx`);
            };

            return (
                <div className="flex flex-col h-screen">
                    {showCloseModal && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex flex-col justify-center items-center p-4">
                            <div className="bg-white p-6 md:p-8 rounded-3xl w-full max-w-sm text-center shadow-2xl relative">
                                {isGeneratingPdf ? (
                                    <div className="py-8">
                                        <div className="inline-block animate-spin w-16 h-16 border-4 border-violet-600 border-t-transparent rounded-full mb-4"></div>
                                        <h3 className="font-black text-2xl text-slate-900">Generando PDF...</h3>
                                        <p className="text-slate-500 font-medium mt-2">Construyendo detalle y rótulos vectoriales</p>
                                    </div>
                                ) : (
                                    <>
                                        <h3 className="font-black text-2xl text-slate-900 mb-6">Emisión de Despacho</h3>
                                        <div className="space-y-4">
                                            <button onClick={() => generarReporteSalida('download')} className="w-full flex items-center justify-center gap-3 bg-violet-600 hover:bg-violet-700 text-white px-5 py-4 rounded-xl font-bold text-lg transition-colors">
                                                <Icon name="printer" size={24} /> Descargar PDF
                                            </button>
                                            <button onClick={() => generarReporteSalida('share')} className="w-full flex items-center justify-center gap-3 bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-4 rounded-xl font-bold text-lg transition-colors shadow-lg shadow-emerald-500/20">
                                                <Icon name="share" size={24} /> Compartir (Móvil)
                                            </button>
                                            <button onClick={() => setShowCloseModal(false)} className="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 px-5 py-4 rounded-xl font-bold transition-colors mt-2">
                                                Cancelar
                                            </button>
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>
                    )}
                    {showHelp && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex flex-col justify-center items-center p-4">
                            <div className="bg-white p-6 md:p-8 rounded-3xl w-full max-w-2xl shadow-2xl relative max-h-[90vh] flex flex-col">
                                <div className="sticky top-0 bg-white pb-4 border-b border-slate-100 flex justify-between items-center shrink-0">
                                    <h3 className="font-black text-2xl text-violet-900 flex items-center gap-3">
                                        <Icon name="tag" size={28} /> Manual de Salidas
                                    </h3>
                                    <button onClick={() => setShowHelp(false)} className="bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-full w-10 h-10 font-black text-xl flex items-center justify-center transition-colors">✕</button>
                                </div>
                                
                                <div className="overflow-y-auto overflow-x-hidden pr-2 flex-1 mt-6 space-y-8 custom-scrollbar">
                                    <div className="space-y-3">
                                        <h4 className="font-bold text-lg text-slate-800 flex items-center gap-2"><span className="bg-violet-100 text-violet-700 w-8 h-8 rounded-lg flex justify-center items-center font-black">1</span> Escáner Activo</h4>
                                        <p className="text-slate-600 text-sm leading-relaxed px-10">Use el botón grande violeta a la izquierda para activar la cámara del dispositivo. Apunte con la cámara al código QR impreso en el rótulo de la bobina que está por salir de la fábrica.</p>
                                    </div>
                                    <div className="space-y-3">
                                        <h4 className="font-bold text-lg text-slate-800 flex items-center gap-2"><span className="bg-blue-100 text-blue-700 w-8 h-8 rounded-lg flex justify-center items-center font-black">2</span> Sistema de Verificación</h4>
                                        <p className="text-slate-600 text-sm leading-relaxed px-10">Al escuchar el sonido de confirmación, la bobina aparecerá automáticamente en la lista derecha ("Registro de Salidas"). Si necesita remover un error, use el icono de cesto de basura rojo junto a cada lectura.</p>
                                    </div>
                                    <div className="space-y-3">
                                        <h4 className="font-bold text-lg text-slate-800 flex items-center gap-2"><span className="bg-amber-100 text-amber-700 w-8 h-8 rounded-lg flex justify-center items-center font-black">3</span> Remito Final (PDF)</h4>
                                        <p className="text-slate-600 text-sm leading-relaxed px-10">Cuando la mula o auto elevador termine de cargar, presione <strong className="text-violet-700">CREAR REMITO DE SALIDA</strong>. Se agruparán todos los lotes leídos en un único documento de validación que podrá descargar a la PC o compartir al WhatsApp responsable.</p>
                                    </div>
                                </div>

                                <div className="pt-6 border-t border-slate-100 mt-4 shrink-0">
                                    <button onClick={() => setShowHelp(false)} className="w-full bg-slate-900 hover:bg-slate-800 text-white py-4 rounded-xl font-bold uppercase tracking-widest text-sm transition-colors">Entendido</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* NAVBAR */}
                    <nav className="bg-violet-900 shadow-xl px-4 sm:px-8 py-4 no-print flex justify-between items-center z-40 shrink-0 border-b-4 border-violet-500">
                        <div>
                            <span className="text-white text-lg font-black tracking-tighter uppercase block"><Icon name="box" size={16} /> Terminal Despacho</span>
                            <span className="text-violet-300 text-xs font-bold uppercase tracking-widest">MOLDERIL S.A.</span>
                        </div>
                        <div className="flex items-center gap-3">
                            <button onClick={() => setShowHelp(true)} className="text-violet-200 hover:text-white font-bold text-sm bg-violet-800 px-4 py-2 rounded-lg flex items-center gap-2 border border-violet-700 transition-colors">
                                <Icon name="tag" size={14} /> Ayuda
                            </button>
                            <a href="index.html" className="text-white hover:text-violet-200 font-bold text-sm bg-violet-800 px-4 py-2 rounded-lg flex items-center gap-2 border border-violet-700 transition-colors">
                                <Icon name="arrowLeft" size={14} /> Volver a Menú
                            </a>
                        </div>
                    </nav>

                    <main className="flex-1 flex flex-col md:flex-row overflow-hidden bg-slate-900">
                        
                        {/* PANEL CÁMARA */}
                        <div className="w-full md:w-1/2 p-6 md:p-12 flex flex-col items-center justify-center relative shadow-2xl z-10">
                            <div className="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none" style={{ background: 'radial-gradient(circle, #8b5cf6 0%, transparent 70%)' }}></div>
                            
                            <h2 className="text-white font-black text-3xl mb-3 flex items-center gap-3 relative z-10"><Icon name="camera" size={32} /> Escáner Activo</h2>
                            <p className="text-violet-200 text-sm mb-8 text-center max-w-sm relative z-10">Apunta al código QR generado por la aplicación de Recepción Logística para registrar la entrega a la planta.</p>

                            <div className="bg-white p-3 rounded-2xl w-full max-w-md shadow-2xl relative z-10 min-h-[300px] flex items-center justify-center border-4 border-violet-500/30">
                                {!isOutputScanning ? (
                                    <button onClick={() => setIsOutputScanning(true)} className="bg-violet-600 text-white px-8 py-4 rounded-xl font-black text-lg w-full h-full flex items-center justify-center gap-3 hover:bg-violet-700 transition-all active:scale-95 shadow-lg shadow-violet-500/50">
                                        <Icon name="camera" size={24} /> INICIAR LECTURA
                                    </button>
                                ) : (
                                    <div className="w-full h-full flex flex-col relative">
                                        <div id="reader-salidas" className="w-full bg-slate-100 rounded-xl overflow-hidden shadow-inner"></div>
                                        <button onClick={closeOutputScanner} className="absolute -bottom-16 left-0 right-0 mx-auto w-3/4 bg-red-600/90 backdrop-blur-md text-white px-6 py-3 rounded-xl font-bold hover:bg-red-700 shadow-xl border border-red-500/50 flex items-center justify-center gap-2">
                                            <Icon name="close" /> PAUSAR CÁMARA
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* PANEL LISTA */}
                        <div className="w-full md:w-1/2 bg-slate-50 flex flex-col p-6 shadow-[-10px_0_20px_rgba(0,0,0,0.1)] z-20 h-full">
                            <div className="flex justify-between items-end border-b-2 border-slate-200 pb-5 mb-5 shrink-0">
                                <div>
                                    <h3 className="text-xl font-black text-slate-800 uppercase tracking-tight">Registro de Salidas</h3>
                                    <p className="text-xs font-bold text-slate-500 uppercase mt-1">Bobinas descontadas: {scannedItems.length}</p>
                                </div>
                                <div className="text-right">
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Kilos Totales</p>
                                    <p className="text-3xl font-black text-violet-700 leading-none mt-1">
                                        {scannedItems.reduce((acc, obj) => acc + (parseFloat(String(obj.kg).replace(',', '.')) || 0), 0).toLocaleString('es-AR')} <span className="text-lg">kg</span>
                                    </p>
                                </div>
                            </div>

                            <div className="flex-1 overflow-y-auto space-y-3 pr-2 scrollbar-thin scrollbar-thumb-slate-300">
                                {scannedItems.length === 0 ? (
                                    <div className="h-full flex flex-col items-center justify-center text-slate-300 opacity-80">
                                        <Icon name="box" size={64} />
                                        <p className="mt-4 font-bold text-slate-400 text-lg">La lista está vacía</p>
                                        <p className="text-sm text-slate-400 mt-2 text-center max-w-xs">Encienda la cámara y escanee el código del rótulo impreso.</p>
                                    </div>
                                ) : (
                                    scannedItems.map((item, idx) => (
                                        <div key={idx} className="bg-white border border-slate-200 p-4 rounded-xl flex justify-between items-center shadow-sm hover:shadow-md transition-shadow group relative overflow-hidden">
                                            <div className="absolute left-0 top-0 bottom-0 w-1 bg-violet-500"></div>
                                            <div className="pl-2">
                                                <div className="flex items-center gap-2 mb-1">
                                                    <p className="font-black text-slate-800 uppercase text-sm leading-tight">{item.sku}</p>
                                                    <span className="text-[9px] bg-slate-100 text-slate-600 px-2 py-0.5 rounded font-bold border border-slate-200 uppercase">{item.tipo}</span>
                                                </div>
                                                <p className="text-[10px] text-slate-500 font-mono">UID: {item.uid}</p>
                                                <p className="text-[10px] text-slate-400 font-bold uppercase mt-0.5">L.MADRE: <span className="text-slate-700">{item.loteMadre}</span> | L.HIJA: <span className="text-slate-700">{item.loteHija}</span></p>
                                            </div>
                                            <div className="flex items-center gap-4">
                                                <div className="text-right">
                                                    <div className="font-black text-2xl text-violet-700 leading-none">{item.kg}</div>
                                                    <div className="text-[9px] font-bold text-slate-400 uppercase mt-1">Kg Netos</div>
                                                </div>
                                                <button onClick={() => removeScannedItem(item.uid)} className="text-slate-300 hover:text-red-500 hover:bg-red-50 p-2 rounded-lg transition-colors border border-transparent hover:border-red-100" title="Eliminar Escaneo">
                                                    <Icon name="trash" size={20} />
                                                </button>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>

                            <div className="pt-6 mt-4 border-t-2 border-slate-200 shrink-0">
                                <button
                                    onClick={() => setShowCloseModal(true)}
                                    disabled={scannedItems.length === 0}
                                    className="w-full bg-violet-600 text-white py-4 rounded-xl font-black uppercase tracking-wider flex justify-center items-center gap-3 hover:bg-violet-700 disabled:opacity-50 disabled:cursor-not-allowed shadow-xl shadow-violet-500/20 active:scale-95 transition-all mb-3"
                                >
                                    <Icon name="filePdf" size={24} /> CREAR REMITO DE SALIDA (PDF)
                                </button>
                                
                                <div className="flex gap-3">
                                    <button
                                        onClick={exportarExcel}
                                        disabled={scannedItems.length === 0}
                                        className="w-full bg-slate-800 text-white py-3 rounded-xl font-bold uppercase tracking-wider flex justify-center items-center gap-2 hover:bg-slate-900 disabled:opacity-50 disabled:cursor-not-allowed shadow-md active:scale-95 transition-all text-sm"
                                    >
                                        <Icon name="upload" size={18} /> Exportar Excel DB
                                    </button>
                                    <button
                                        onClick={() => { if (window.confirm("¿Seguro que desea limpiar la lista actual?")) setScannedItems([]); }}
                                        disabled={scannedItems.length === 0}
                                        className="bg-red-50 text-red-600 border border-red-200 px-6 py-3 rounded-xl font-bold uppercase flex justify-center items-center gap-2 hover:bg-red-100 disabled:opacity-50 disabled:cursor-not-allowed active:scale-95 transition-all text-sm"
                                        title="Vaciar Lista"
                                    >
                                        <Icon name="trash" size={18} />
                                    </button>
                                </div>
                            </div>
                        </div>

                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
